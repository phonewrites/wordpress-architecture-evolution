# RDS resources needed to split Database from the WordpressEC2 instance
  RDSSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: "WordPressRDSSubnetGroup"     
      DBSubnetGroupDescription: "RDS Subnet Group for the WordPress DB"
      SubnetIds: 
        - !Ref SubnetDbA
        - !Ref SubnetDbB
        - !Ref SubnetDbC
      Tags:
        - Key: Name
          Value: "WordPressRDSSubnetGroup"
  RDSinstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    Properties:
      Engine: mysql
      EngineVersion: 8.0.32
      MultiAZ: false
      DBInstanceIdentifier: !GetAtt DBName.Value
      MasterUsername: !GetAtt DBUser.Value
      MasterUserPassword: "{{resolve:ssm-secure:/Wordpress/DBPassword}}"
      DBInstanceClass: "db.t3.micro"
      # StorageType: gp2
      AllocatedStorage: 20
      # NetworkType: IPV4
      DBSubnetGroupName: !Ref RDSSubnetGroup
      # PubliclyAccessible: false
      VPCSecurityGroups:
        - !Ref SGDatabase
      AvailabilityZone: !GetAtt SubnetPublicA.AvailabilityZone
      #This param is mandatory for MySQL engine
      #known as "Initial database name" in console-ui
      DBName: !GetAtt DBName.Value

# EFS resources needed to split Wordpress content from WordpressEC2
  WordpressEFS:
    Type: 'AWS::EFS::FileSystem'
    Properties:
      FileSystemTags:
        - Key: Name
          Value: "wordpress-efs"
      BackupPolicy:
        Status: ENABLED
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS
      Encrypted: false
      ThroughputMode: bursting
      PerformanceMode: generalPurpose
  Fn::ForEach::MountTargets:
    - zone
    - [A, B, C]
    - 'MountTarget${zone}':
        Type: AWS::EFS::MountTarget
        Properties:
          FileSystemId: !Ref WordpressEFS
          SubnetId:
            Ref:
              !Sub 'SubnetApp${zone}'
          SecurityGroups:
            - !GetAtt SGEFS.GroupId

# # Resources needed for load balancing and scaling
  WordpressALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: "wordpress-alb"
      # Scheme: internet-facing
      # IpAddressType: ipv4
      Subnets: 
        - !Ref SubnetPublicA
        - !Ref SubnetPublicB
        - !Ref SubnetPublicC
      SecurityGroups: 
        - !Ref SGALB

