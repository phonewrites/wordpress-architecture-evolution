AWSTemplateFormatVersion: 2010-09-09
Description: >-
  WordPress application AWS architecture evolution - Stage 2
  Standalone server using Launch Template + stack-driven on-instance refresh + optional EBS snapshot
Parameters:
  LatestAmiId:
    Description: Latest Amazon Linux 2023 AMI.
    #Automatically fetches latest AL2023 AMI ID from AWS Systems Manager
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.18-x86_64'
  EnableSnapshotStack:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >-
      When true, create in-template resources (Lambda + custom resource) to snapshot WordpressEC2 root EBS volume.
      First deploy can leave false; after WordPress is set up, update the same stack with true to opt in.
  SnapshotNonce:
    Type: String
    Default: v1
    AllowedPattern: '^v[1-9][0-9]*$'
    ConstraintDescription: >-
      v then a positive integer (v1, v2, v3, …).
    MaxLength: 16
    Description: >-
      When setting EnableSnapshotStack to true, bump this during stack update to label a new version (e.g. v1 to v2);
      Must match v + integer.
  CfnMetadataNonce:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 2147483647
    Description: >-
      Positive integer; increase on stack update so WordpressEC2FromLT Metadata changes and cfn-hup re-runs cfn-init.
  RestoreRootSnapshotId:
    Type: String
    Default: ''
    AllowedPattern: '^$|^snap-[a-z0-9]+$'
    ConstraintDescription: Empty or snap-... (lowercase hex).
    Description: >-
      Empty: new AMI and full WordPress install (greenfield stage2 stack).
      Non-empty: root EBS snapshot id (e.g. WordpressRootSnapshotId from stage1 with EnableSnapshotStack);
      Keeps the on-disk site on stack update from stage1 to stage2, or starts a new stack from an existing compatible snapshot.

Conditions:
  CreateSnapshotStack: !Equals [!Ref EnableSnapshotStack, 'true']
  HasRestoreSnapshot: !Not [!Equals [!Ref RestoreRootSnapshotId, '']]
  UseFreshAmiRoot: !Not [!Condition HasRestoreSnapshot]

Resources:

# Initial network skeleton with public subnets only
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.125.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
      - Key: Name
        Value: !Sub 'vpc-${AWS::Region}'
  SubnetPublicA:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      CidrBlock: 10.125.0.0/20
      MapPublicIpOnLaunch: true
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock:
        Fn::Sub:
          - "${VpcPart}${SubnetPart}"
          - SubnetPart: '00::/64'
            VpcPart: !Select [ 0, !Split [ '00::/56', !Select [ 0, !GetAtt VPC.Ipv6CidrBlocks ]]]
      Tags:
        - Key: Name
          Value: sn-public-A
  SubnetPublicB:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 1, !GetAZs '' ]
      CidrBlock: 10.125.16.0/20
      MapPublicIpOnLaunch: true
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock:
        Fn::Sub:
          - "${VpcPart}${SubnetPart}"
          - SubnetPart: '01::/64'
            VpcPart: !Select [ 0, !Split [ '00::/56', !Select [ 0, !GetAtt VPC.Ipv6CidrBlocks ]]]
      Tags:
        - Key: Name
          Value: sn-public-B
  SubnetPublicC:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 2, !GetAZs '' ]
      CidrBlock: 10.125.32.0/20
      MapPublicIpOnLaunch: true
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock:
        Fn::Sub:
          - "${VpcPart}${SubnetPart}"
          - SubnetPart: '02::/64'
            VpcPart: !Select [ 0, !Split [ '00::/56', !Select [ 0, !GetAtt VPC.Ipv6CidrBlocks ]]]
      Tags:
        - Key: Name
          Value: sn-public-C
  IPv6CidrBlock:
    Type: AWS::EC2::VPCCidrBlock
    Properties:
      VpcId: !Ref VPC
      AmazonProvidedIpv6CidrBlock: true
  InternetGateway:
    Type: 'AWS::EC2::InternetGateway'
    Properties:
      Tags:
      - Key: Name
        Value: !Sub 'igw-${AWS::Region}'
  InternetGatewayAttachment:
    Type: 'AWS::EC2::VPCGatewayAttachment'
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway
  RTPublic: 
    Type: 'AWS::EC2::RouteTable'
    Properties:
      VpcId: !Ref VPC
      Tags:
      - Key: Name
        Value: !Sub 'vpc-rt-public-${AWS::Region}'
  RTPublicDefaultIPv4: 
    Type: 'AWS::EC2::Route'
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId:
        Ref: RTPublic
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId:
        Ref: InternetGateway
  RTPublicDefaultIPv6: 
    Type: 'AWS::EC2::Route'
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId:
        Ref: RTPublic
      DestinationIpv6CidrBlock: '::/0'
      GatewayId:
        Ref: InternetGateway
  RTAssociationPubA:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref SubnetPublicA
      RouteTableId:
        Ref: RTPublic
  RTAssociationPubB:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref SubnetPublicB
      RouteTableId:
        Ref: RTPublic
  RTAssociationPubC:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref SubnetPublicC
      RouteTableId:
        Ref: RTPublic

# SSM Parameters for WordPress configuration
  DBName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/Wordpress/DBName"
      Description: "Wordpress Database Name"
      Type: String
      Value: "wordpressdb"
  DBUser:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/Wordpress/DBUser"
      Description: "Wordpress Database User"
      Type: String
      Value: "wordpressuser"
  DBEndpoint:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/Wordpress/DBEndpoint"
      Description: "Wordpress Endpoint Name"
      Type: String
      Value: "localhost"  #Stage 2: MariaDB runs locally on same EC2 instance
      #Refer to the .md file for instructions on creating the DBPassword SecureString parameter

# WordPress server Launch Template for fresh WordPress install – greenfield stage2 stack 
  FreshWordpressLT:
    Type: AWS::EC2::LaunchTemplate
    Condition: UseFreshAmiRoot
    DependsOn:
      - DBName
      - DBUser    
      - DBEndpoint    
    Properties:
      LaunchTemplateName: "Wordpress"
      VersionDescription: "Fresh AMI root — first-time stage2 and empty RestoreRootSnapshotId"
      LaunchTemplateData: 
        ImageId: !Ref LatestAmiId
        InstanceType: t2.micro
        SecurityGroupIds:
          - !GetAtt SGWordpress.GroupId
        IamInstanceProfile:
          Arn: !GetAtt WordpressInstanceProfile.Arn
        # Fresh AMI root only. Restore path uses sibling resource WordpressLT (HasRestoreSnapshot) so
        # toggling RestoreRootSnapshotId swaps LaunchTemplateId on the instance (replace) instead of
        # mutating root snapshot on the same LT (EC2: snapshotId cannot be modified on root device).
        DisableApiTermination: false
        CreditSpecification:
          CpuCredits: Standard
        MetadataOptions:
          HttpEndpoint: enabled
          HttpTokens: required
          HttpPutResponseHopLimit: 2
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash -xe
            SNAPSHOT_RESTORE_ID='${RestoreRootSnapshotId}'
            if [ -n "$SNAPSHOT_RESTORE_ID" ]; then
              # Restored root volume from EBS snapshot — keep existing MariaDB data and WordPress files; do not re-run fresh install.
              if ! rpm -q aws-cfn-bootstrap >/dev/null 2>&1; then dnf install -y aws-cfn-bootstrap; fi
              # Step 8 - Use the browser address for Wordpress site links
              if [ -f /var/www/html/wp-config.php ] && ! grep -q 'Follow browser hostname for WP_HOME' /var/www/html/wp-config.php; then
                WPCONFIG_INSERT_TMP=$(mktemp)
                WPCONFIG_MERGED_TMP=$(mktemp)
                cat > "$WPCONFIG_INSERT_TMP" <<'WPCONFIG_BROWSER_HOST_SNIPPET'
            /* Follow browser hostname for WP_HOME and WP_SITEURL (HTTP_HOST; no fixed public IP in redirects). */
            if (php_sapi_name() !== 'cli' && !empty($_SERVER['HTTP_HOST'])) {
                define('WP_HOME', 'http://' . $_SERVER['HTTP_HOST']);
                define('WP_SITEURL', 'http://' . $_SERVER['HTTP_HOST']);
            }
            WPCONFIG_BROWSER_HOST_SNIPPET
                awk 'NR==FNR { buf = buf $0 ORS; next } /stop editing! Happy publishing/ && !done { printf "%s", buf; done=1 } { print }' "$WPCONFIG_INSERT_TMP" /var/www/html/wp-config.php > "$WPCONFIG_MERGED_TMP"
                mv "$WPCONFIG_MERGED_TMP" /var/www/html/wp-config.php
                rm -f "$WPCONFIG_INSERT_TMP"
              fi
              systemctl daemon-reload || true
              # Step 4 - Web and DB Servers Online - and set to startup
              systemctl enable httpd mariadb || true
              systemctl restart httpd mariadb || true
            fi
            if [ -z "$SNAPSHOT_RESTORE_ID" ]; then
              # Step 1 - Import parameter store values
              DBName=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/DBName --query Parameters[0].Value --output text)
              DBUser=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/DBUser --query Parameters[0].Value --output text)
              DBEndpoint=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/DBEndpoint --query Parameters[0].Value --output text)
              DBPassword=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/DBPassword --with-decryption --query Parameters[0].Value --output text)
              DBRootPassword=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/DBRootPassword --with-decryption --query Parameters[0].Value --output text)
              # Step 2 - Run system updates
              dnf -y --refresh upgrade
              # Step 3 - Install system software - including Web and DB
              dnf install -y aws-cfn-bootstrap wget httpd php php-mysqlnd php-fpm php-mysqli php-json php-mbstring php-xml php-gd php-opcache php-intl php-zip php-devel stress mariadb1011-server
              # Step 4 - Web and DB Servers Online - and set to startup
              systemctl enable httpd mariadb
              systemctl start httpd mariadb
              # Step 5 - Set MariaDB Root Password
              mysqladmin -u root password "$DBRootPassword"
              # Step 6 - Download & install Wordpress
              wget https://wordpress.org/latest.tar.gz -P /var/www/html
              cd /var/www/html
              tar -zxvf latest.tar.gz
              cp -rvf wordpress/* .
              rm -rf wordpress latest.tar.gz
              # Step 7 - Configure Wordpress
              cp ./wp-config-sample.php ./wp-config.php
              sed -i "s/'database_name_here'/'$DBName'/g" wp-config.php
              sed -i "s/'username_here'/'$DBUser'/g" wp-config.php
              sed -i "s/'password_here'/'$DBPassword'/g" wp-config.php
              sed -i "s/'localhost'/'$DBEndpoint'/g" wp-config.php
              # Step 8 - Use the browser address for Wordpress site links
              if ! grep -q 'Follow browser hostname for WP_HOME' wp-config.php; then
                WPCONFIG_INSERT_TMP=$(mktemp)
                WPCONFIG_MERGED_TMP=$(mktemp)
                cat > "$WPCONFIG_INSERT_TMP" <<'WPCONFIG_BROWSER_HOST_SNIPPET'
            /* Follow browser hostname for WP_HOME and WP_SITEURL (HTTP_HOST; no fixed public IP in redirects). */
            if (php_sapi_name() !== 'cli' && !empty($_SERVER['HTTP_HOST'])) {
                define('WP_HOME', 'http://' . $_SERVER['HTTP_HOST']);
                define('WP_SITEURL', 'http://' . $_SERVER['HTTP_HOST']);
            }
            WPCONFIG_BROWSER_HOST_SNIPPET
                awk 'NR==FNR { buf = buf $0 ORS; next } /stop editing! Happy publishing/ && !done { printf "%s", buf; done=1 } { print }' "$WPCONFIG_INSERT_TMP" wp-config.php > "$WPCONFIG_MERGED_TMP"
                mv "$WPCONFIG_MERGED_TMP" wp-config.php
                rm -f "$WPCONFIG_INSERT_TMP"
              fi
              # Step 9 - Fix the permissions
              usermod -a -G apache ec2-user
              chown -R ec2-user:apache /var/www
              chmod 2775 /var/www
              find /var/www -type d -exec chmod 2775 {} \;
              find /var/www -type f -exec chmod 0664 {} \;
              # Step 10 - Create Wordpress DB
              echo "CREATE DATABASE $DBName;" >> /tmp/db.setup
              echo "CREATE USER '$DBUser'@'localhost' IDENTIFIED BY '$DBPassword';" >> /tmp/db.setup
              echo "GRANT ALL ON $DBName.* TO '$DBUser'@'localhost';" >> /tmp/db.setup
              echo "FLUSH PRIVILEGES;" >> /tmp/db.setup
              mysql -u root --password="$DBRootPassword" < /tmp/db.setup
              rm -f /tmp/db.setup
            fi
            # Step 11 - Use cfn-init + cfn-hup for stack-driven refresh on EC2 Metadata change
            mkdir -p /etc/cfn/hooks.d
            touch /var/log/cfn-wp-refresh.log
            {
              echo '[main]'
              echo "stack=${AWS::StackId}"
              echo "region=${AWS::Region}"
              echo 'verbose=true'
              echo 'interval=5'
            } >/etc/cfn/cfn-hup.conf
            {
              echo '[cfn-auto-reloader-hook]'
              echo 'triggers=post.update'
              echo 'path=Resources.WordpressEC2FromLT.Metadata'
              echo "action=/opt/aws/bin/cfn-init -v -c wordpress_always --stack ${AWS::StackId} --resource WordpressEC2FromLT --region ${AWS::Region}"
            } >/etc/cfn/hooks.d/cfn-auto-reloader.conf
            /opt/aws/bin/cfn-init -v -c wordpress_always --stack ${AWS::StackId} --resource WordpressEC2FromLT --region ${AWS::Region} || echo "cfn-init non-zero exit" >> /var/log/cfn-wp-refresh.log
            nohup /opt/aws/bin/cfn-hup >/var/log/cfn-hup.log 2>&1 &
            # Step 12 - Signal end of installation & configuration via cfn-signal
            /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackId} --resource WordpressEC2FromLT --region ${AWS::Region}

# Optional resources for crash-consistent root EBS snapshot
  SnapshotHelperRole:
    Type: AWS::IAM::Role
    Condition: CreateSnapshotStack
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: !Sub snapshot-ec2-${AWS::StackName}
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:CreateSnapshot
                  - ec2:CreateTags
                Resource: '*'

  SnapshotHelperLambda:
    Type: AWS::Lambda::Function
    Condition: CreateSnapshotStack
    Properties:
      Handler: index.handler
      Runtime: python3.12
      Role: !GetAtt SnapshotHelperRole.Arn
      Timeout: 120
      Code:
        ZipFile: |
          import cfnresponse
          import boto3
          # Describe the WordPress EC2 instance - find root EBS volume - create snapshot with tags - return snapshot id to CloudFormation.
          def handler(event, context):
              try:
                  if event["RequestType"] == "Delete":
                      cfnresponse.send(
                          event,
                          context,
                          cfnresponse.SUCCESS,
                          {},
                          event.get("PhysicalResourceId") or "delete-no-snapshot-removal",
                      )
                      return
                  props = event["ResourceProperties"]
                  instance_id = props["InstanceId"]
                  desc = (props.get("Description") or "wordpress-root-snapshot")[:255]
                  parent = (props.get("ParentStackName") or "")[:256]
                  ec2 = boto3.client("ec2")
                  di = ec2.describe_instances(InstanceIds=[instance_id])
                  if not di.get("Reservations"):
                      raise RuntimeError("Instance not found: %s" % instance_id)
                  inst = di["Reservations"][0]["Instances"][0]
                  root = inst["RootDeviceName"]
                  vol_id = None
                  for bdm in inst.get("BlockDeviceMappings", []):
                      if bdm.get("DeviceName") == root and "Ebs" in bdm:
                          vol_id = bdm["Ebs"]["VolumeId"]
                          break
                  if not vol_id:
                      raise RuntimeError("Could not resolve root EBS volume for %s" % instance_id)
                  tags = [{"Key": "Name", "Value": desc[:255]}]
                  if parent:
                      tags.append({"Key": "ParentStack", "Value": parent})
                  nonce = (props.get("Nonce") or "")[:256]
                  if nonce:
                      tags.append({"Key": "SnapshotNonce", "Value": nonce})
                  snap = ec2.create_snapshot(
                      VolumeId=vol_id,
                      Description=desc,
                      TagSpecifications=[
                          {"ResourceType": "snapshot", "Tags": tags},
                      ],
                  )
                  sid = snap["SnapshotId"]
                  data = {"SnapshotId": sid, "VolumeId": vol_id}
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, data, sid)
              except Exception as e:
                  print(repr(e))
                  cfnresponse.send(
                      event,
                      context,
                      cfnresponse.FAILED,
                      {"Error": str(e)[:2048]},
                      event.get("PhysicalResourceId", "failed"),
                  )

  WordpressRootEbsSnapshot:
    Type: Custom::WordpressRootEbsSnapshot
    Condition: CreateSnapshotStack
    Properties:
      ServiceToken: !GetAtt SnapshotHelperLambda.Arn
      InstanceId: !Ref WordpressEC2FromLT
      Description: !Sub 'wordpress-stage2-root-ebs-snapshot'
      Nonce: !Ref SnapshotNonce
      ParentStackName: !Ref AWS::StackName

# Optional resources for restoring from RestoreRootSnapshotId
  RestoreRootAmiRole:
    Type: AWS::IAM::Role
    Condition: HasRestoreSnapshot
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: !Sub restore-root-ami-${AWS::StackName}
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:RegisterImage
                  - ec2:DeregisterImage
                  - ec2:DescribeImages
                  - ec2:DescribeSnapshots
                  - ec2:CreateTags
                Resource: '*'

  RestoreRootAmiLambda:
    Type: AWS::Lambda::Function
    Condition: HasRestoreSnapshot
    Properties:
      Handler: index.handler
      Runtime: python3.12
      Role: !GetAtt RestoreRootAmiRole.Arn
      Timeout: 900
      Code:
        ZipFile: |
          import cfnresponse
          import boto3
          import time
          # Register AMI from root snapshot on Create; deregister AMI on Delete; answer CloudFormation.
          def handler(event, context):
              ec2 = boto3.client("ec2")
              try:
                  req = event["RequestType"]
                  props = event.get("ResourceProperties") or {}
                  snap_id = (props.get("SnapshotId") or "").strip()
                  ami_name = (props.get("AmiName") or "wordpress-restore-root")[:128]
                  root_dev = (props.get("RootDeviceName") or "/dev/xvda").strip()

                  if req == "Delete":
                      pid = event.get("PhysicalResourceId") or ""
                      if pid.startswith("ami-"):
                          try:
                              ec2.deregister_image(ImageId=pid)
                          except Exception as ex:
                              print("deregister:", repr(ex))
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, pid or "deleted")
                      return

                  if req == "Update":
                      old = event.get("PhysicalResourceId") or ""
                      if old.startswith("ami-"):
                          try:
                              ec2.deregister_image(ImageId=old)
                          except Exception as ex:
                              print("deregister old on update:", repr(ex))

                  if not snap_id.startswith("snap-"):
                      raise ValueError("SnapshotId must be snap-…")

                  for _ in range(120):
                      s = ec2.describe_snapshots(SnapshotIds=[snap_id])["Snapshots"][0]
                      if s.get("State") == "completed":
                          break
                      time.sleep(5)
                  else:
                      raise TimeoutError("snapshot not completed: " + snap_id)

                  reg = ec2.register_image(
                      Name=ami_name,
                      RootDeviceName=root_dev,
                      VirtualizationType="hvm",
                      Architecture="x86_64",
                      BlockDeviceMappings=[
                          {
                              "DeviceName": root_dev,
                              "Ebs": {
                                  "SnapshotId": snap_id,
                                  "VolumeType": "gp3",
                                  "DeleteOnTermination": True,
                              },
                          },
                      ],
                  )
                  ami_id = reg["ImageId"]
                  ec2.create_tags(
                      Resources=[ami_id],
                      Tags=[
                          {"Key": "Name", "Value": ami_name[:255]},
                          {"Key": "SourceSnapshot", "Value": snap_id[:255]},
                      ],
                  )
                  ec2.get_waiter("image_available").wait(
                      ImageIds=[ami_id],
                      WaiterConfig={"Delay": 15, "MaxAttempts": 56},
                  )
                  cfnresponse.send(
                      event, context, cfnresponse.SUCCESS, {"AmiId": ami_id}, ami_id
                  )
              except Exception as e:
                  print(repr(e))
                  cfnresponse.send(
                      event,
                      context,
                      cfnresponse.FAILED,
                      {"Error": str(e)[:2048]},
                      event.get("PhysicalResourceId", "failed"),
                  )

  RestoreRootRegisteredAmi:
    Type: Custom::RestoreRootSnapshotAmi
    Condition: HasRestoreSnapshot
    Properties:
      ServiceToken: !GetAtt RestoreRootAmiLambda.Arn
      SnapshotId: !Ref RestoreRootSnapshotId
      AmiName: !Sub 'Wordpress-ami-from-${RestoreRootSnapshotId}'
      RootDeviceName: /dev/xvda

# WordPress server Launch Template for stack update from stage1 to stage2 
  WordpressLT:
    Type: AWS::EC2::LaunchTemplate
    Condition: HasRestoreSnapshot
    DependsOn:
      - RestoreRootRegisteredAmi
      - DBName
      - DBUser
      - DBEndpoint
    Properties:
      LaunchTemplateName: !Sub 'Wordpress-restored-from-${RestoreRootSnapshotId}'
      VersionDescription: Evolutionary / restore — root from RestoreRootSnapshotId (EBS snapshot boot)
      LaunchTemplateData:
        # AMI built from RestoreRootSnapshotId by RestoreRootRegisteredAmi (register_image). Avoids EC2 snapshotId
        # cannot be modified when combining snapshot root with a separate Latest/source AMI in LT or on the instance.
        ImageId: !GetAtt RestoreRootRegisteredAmi.AmiId
        InstanceType: t2.micro
        SecurityGroupIds:
          - !GetAtt SGWordpress.GroupId
        IamInstanceProfile:
          Arn: !GetAtt WordpressInstanceProfile.Arn
        DisableApiTermination: false
        CreditSpecification:
          CpuCredits: Standard
        MetadataOptions:
          HttpEndpoint: enabled
          HttpTokens: required
          HttpPutResponseHopLimit: 2
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash -xe
            SNAPSHOT_RESTORE_ID='${RestoreRootSnapshotId}'
            if [ -n "$SNAPSHOT_RESTORE_ID" ]; then
              # Restored root volume from EBS snapshot — keep existing MariaDB data and WordPress files; do not re-run fresh install.
              if ! rpm -q aws-cfn-bootstrap >/dev/null 2>&1; then dnf install -y aws-cfn-bootstrap; fi
              # Step 8 - Use the browser address for Wordpress site links
              if [ -f /var/www/html/wp-config.php ] && ! grep -q 'Follow browser hostname for WP_HOME' /var/www/html/wp-config.php; then
                WPCONFIG_INSERT_TMP=$(mktemp)
                WPCONFIG_MERGED_TMP=$(mktemp)
                cat > "$WPCONFIG_INSERT_TMP" <<'WPCONFIG_BROWSER_HOST_SNIPPET'
            /* Follow browser hostname for WP_HOME and WP_SITEURL (HTTP_HOST; no fixed public IP in redirects). */
            if (php_sapi_name() !== 'cli' && !empty($_SERVER['HTTP_HOST'])) {
                define('WP_HOME', 'http://' . $_SERVER['HTTP_HOST']);
                define('WP_SITEURL', 'http://' . $_SERVER['HTTP_HOST']);
            }
            WPCONFIG_BROWSER_HOST_SNIPPET
                awk 'NR==FNR { buf = buf $0 ORS; next } /stop editing! Happy publishing/ && !done { printf "%s", buf; done=1 } { print }' "$WPCONFIG_INSERT_TMP" /var/www/html/wp-config.php > "$WPCONFIG_MERGED_TMP"
                mv "$WPCONFIG_MERGED_TMP" /var/www/html/wp-config.php
                rm -f "$WPCONFIG_INSERT_TMP"
              fi
              systemctl daemon-reload || true
              # Step 4 - Web and DB Servers Online - and set to startup
              systemctl enable httpd mariadb || true
              systemctl restart httpd mariadb || true
            fi
            if [ -z "$SNAPSHOT_RESTORE_ID" ]; then
              # Step 1 - Import parameter store values
              DBName=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/DBName --query Parameters[0].Value --output text)
              DBUser=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/DBUser --query Parameters[0].Value --output text)
              DBEndpoint=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/DBEndpoint --query Parameters[0].Value --output text)
              DBPassword=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/DBPassword --with-decryption --query Parameters[0].Value --output text)
              DBRootPassword=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/DBRootPassword --with-decryption --query Parameters[0].Value --output text)
              # Step 2 - Run system updates
              dnf -y --refresh upgrade
              # Step 3 - Install system software - including Web and DB
              dnf install -y aws-cfn-bootstrap wget httpd php php-mysqlnd php-fpm php-mysqli php-json php-mbstring php-xml php-gd php-opcache php-intl php-zip php-devel stress mariadb1011-server
              # Step 4 - Web and DB Servers Online - and set to startup
              systemctl enable httpd mariadb
              systemctl start httpd mariadb
              # Step 5 - Set MariaDB Root Password
              mysqladmin -u root password "$DBRootPassword"
              # Step 6 - Download & install Wordpress
              wget https://wordpress.org/latest.tar.gz -P /var/www/html
              cd /var/www/html
              tar -zxvf latest.tar.gz
              cp -rvf wordpress/* .
              rm -rf wordpress latest.tar.gz
              # Step 7 - Configure Wordpress
              cp ./wp-config-sample.php ./wp-config.php
              sed -i "s/'database_name_here'/'$DBName'/g" wp-config.php
              sed -i "s/'username_here'/'$DBUser'/g" wp-config.php
              sed -i "s/'password_here'/'$DBPassword'/g" wp-config.php
              sed -i "s/'localhost'/'$DBEndpoint'/g" wp-config.php
              # Step 8 - Use the browser address for Wordpress site links
              if ! grep -q 'Follow browser hostname for WP_HOME' wp-config.php; then
                WPCONFIG_INSERT_TMP=$(mktemp)
                WPCONFIG_MERGED_TMP=$(mktemp)
                cat > "$WPCONFIG_INSERT_TMP" <<'WPCONFIG_BROWSER_HOST_SNIPPET'
            /* Follow browser hostname for WP_HOME and WP_SITEURL (HTTP_HOST; no fixed public IP in redirects). */
            if (php_sapi_name() !== 'cli' && !empty($_SERVER['HTTP_HOST'])) {
                define('WP_HOME', 'http://' . $_SERVER['HTTP_HOST']);
                define('WP_SITEURL', 'http://' . $_SERVER['HTTP_HOST']);
            }
            WPCONFIG_BROWSER_HOST_SNIPPET
                awk 'NR==FNR { buf = buf $0 ORS; next } /stop editing! Happy publishing/ && !done { printf "%s", buf; done=1 } { print }' "$WPCONFIG_INSERT_TMP" wp-config.php > "$WPCONFIG_MERGED_TMP"
                mv "$WPCONFIG_MERGED_TMP" wp-config.php
                rm -f "$WPCONFIG_INSERT_TMP"
              fi
              # Step 9 - Fix the permissions
              usermod -a -G apache ec2-user
              chown -R ec2-user:apache /var/www
              chmod 2775 /var/www
              find /var/www -type d -exec chmod 2775 {} \;
              find /var/www -type f -exec chmod 0664 {} \;
              # Step 10 - Create Wordpress DB
              echo "CREATE DATABASE $DBName;" >> /tmp/db.setup
              echo "CREATE USER '$DBUser'@'localhost' IDENTIFIED BY '$DBPassword';" >> /tmp/db.setup
              echo "GRANT ALL ON $DBName.* TO '$DBUser'@'localhost';" >> /tmp/db.setup
              echo "FLUSH PRIVILEGES;" >> /tmp/db.setup
              mysql -u root --password="$DBRootPassword" < /tmp/db.setup
              rm -f /tmp/db.setup
            fi
            # Step 11 - Use cfn-init + cfn-hup for stack-driven refresh on EC2 Metadata change
            mkdir -p /etc/cfn/hooks.d
            touch /var/log/cfn-wp-refresh.log
            {
              echo '[main]'
              echo "stack=${AWS::StackId}"
              echo "region=${AWS::Region}"
              echo 'verbose=true'
              echo 'interval=5'
            } >/etc/cfn/cfn-hup.conf
            {
              echo '[cfn-auto-reloader-hook]'
              echo 'triggers=post.update'
              echo 'path=Resources.WordpressEC2FromLT.Metadata'
              echo "action=/opt/aws/bin/cfn-init -v -c wordpress_always --stack ${AWS::StackId} --resource WordpressEC2FromLT --region ${AWS::Region}"
            } >/etc/cfn/hooks.d/cfn-auto-reloader.conf
            /opt/aws/bin/cfn-init -v -c wordpress_always --stack ${AWS::StackId} --resource WordpressEC2FromLT --region ${AWS::Region} || echo "cfn-init non-zero exit" >> /var/log/cfn-wp-refresh.log
            nohup /opt/aws/bin/cfn-hup >/var/log/cfn-hup.log 2>&1 &
            # Step 12 - Signal end of installation & configuration via cfn-signal
            /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackId} --resource WordpressEC2FromLT --region ${AWS::Region}

# WordPress server launched from one of the Launch Templates above 
  WordpressEC2FromLT:
    Type: AWS::EC2::Instance
    DependsOn:
      - DBName
      - DBUser
      - DBEndpoint
    Metadata:
      AWS::CloudFormation::Init:
        configSets:
          wordpress_always:
            - sync_public_endpoint
        sync_public_endpoint:
          commands:
            00_add_timestamp:
              command: !Sub 'echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) cfn-init CfnMetadataNonce=${CfnMetadataNonce}" >> /var/log/cfn-wp-refresh.log'
            01_wp_sync_public_ip:
              command: |
                # Read IMDS session token - public IPv4 - and public hostname for this instance.
                # Set WordPress home and siteurl from hostname when present - otherwise from IPv4 - keep DB URLs aligned with how users open the site.
                IMDS_SESSION_TOKEN=$(curl -fsS -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
                IMDS_PUBLIC_IPV4=$(curl -fsS -H "X-aws-ec2-metadata-token: $IMDS_SESSION_TOKEN" http://169.254.169.254/latest/meta-data/public-ipv4 2>/dev/null || true)
                IMDS_PUBLIC_HOSTNAME=$(curl -fsS -H "X-aws-ec2-metadata-token: $IMDS_SESSION_TOKEN" http://169.254.169.254/latest/meta-data/public-hostname 2>/dev/null || true)
                if [ -z "$IMDS_PUBLIC_IPV4" ]; then echo "No public IPv4; skipping wp option sync" >> /var/log/cfn-wp-refresh.log; exit 0; fi
                if [ ! -f /var/www/html/wp-cli.phar ]; then curl -fsSLo /var/www/html/wp-cli.phar https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar || exit 0; fi
                cd /var/www/html
                if [ -n "$IMDS_PUBLIC_HOSTNAME" ]; then NEW_PUBLIC_SITE_URL="http://$IMDS_PUBLIC_HOSTNAME"; else NEW_PUBLIC_SITE_URL="http://$IMDS_PUBLIC_IPV4"; fi
                PREVIOUS_HOME_URL=$(php /var/www/html/wp-cli.phar --path=/var/www/html --allow-root option get home 2>/dev/null || true)
                PREVIOUS_SITEURL=$(php /var/www/html/wp-cli.phar --path=/var/www/html --allow-root option get siteurl 2>/dev/null || true)
                if [ -z "$PREVIOUS_HOME_URL$PREVIOUS_SITEURL" ]; then echo "WARN 01_wp_sync_public_ip: empty home/siteurl from wp-cli; URL search-replace may miss" >> /var/log/cfn-wp-refresh.log; fi
                wp_search_replace_if_changed() {
                  SEARCH_REPLACE_OLD_VALUE="$1"
                  SEARCH_REPLACE_NEW_VALUE="$2"
                  if [ -n "$SEARCH_REPLACE_OLD_VALUE" ] && [ "$SEARCH_REPLACE_OLD_VALUE" != "$SEARCH_REPLACE_NEW_VALUE" ]; then
                    php /var/www/html/wp-cli.phar --path=/var/www/html --allow-root search-replace "$SEARCH_REPLACE_OLD_VALUE" "$SEARCH_REPLACE_NEW_VALUE" --all-tables >> /var/log/cfn-wp-refresh.log 2>&1 || true
                  fi
                }
                php /var/www/html/wp-cli.phar --path=/var/www/html --allow-root option update home "$NEW_PUBLIC_SITE_URL" >> /var/log/cfn-wp-refresh.log 2>&1 || true
                php /var/www/html/wp-cli.phar --path=/var/www/html --allow-root option update siteurl "$NEW_PUBLIC_SITE_URL" >> /var/log/cfn-wp-refresh.log 2>&1 || true
                # Search-replace old home and siteurl through the database - cover trailing-slash variants - do not hand-escape JSON for wp-cli (avoids corrupting block editor JSON).
                wp_search_replace_if_changed "$PREVIOUS_HOME_URL" "$NEW_PUBLIC_SITE_URL"
                wp_search_replace_if_changed "$PREVIOUS_SITEURL" "$NEW_PUBLIC_SITE_URL"
                for PREVIOUS_HOME_OR_SITEURL in "$PREVIOUS_HOME_URL" "$PREVIOUS_SITEURL"; do
                  [ -z "$PREVIOUS_HOME_OR_SITEURL" ] && continue
                  PREVIOUS_URL_WITHOUT_TRAILING_SLASHES=$(printf '%s' "$PREVIOUS_HOME_OR_SITEURL" | sed 's|/*$||')
                  PREVIOUS_URL_WITH_TRAILING_SLASH_AFTER_HOST="${PREVIOUS_URL_WITHOUT_TRAILING_SLASHES}/"
                  wp_search_replace_if_changed "$PREVIOUS_URL_WITHOUT_TRAILING_SLASHES" "$NEW_PUBLIC_SITE_URL"
                  wp_search_replace_if_changed "$PREVIOUS_URL_WITH_TRAILING_SLASH_AFTER_HOST" "$NEW_PUBLIC_SITE_URL"
                done
                # Map dotted IPv4 home host to regional ec2-* DNS and legacy us-east-1 form - search-replace those URLs when they appear in content.
                PREVIOUS_HOME_HOST=$(echo "$PREVIOUS_HOME_URL" | sed 's|^[^/]*//||;s|/.*||')
                if echo "$PREVIOUS_HOME_HOST" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
                  PREVIOUS_HOME_IPV4_EC2_PUBLIC_DNS_LABEL=$(echo "$PREVIOUS_HOME_HOST" | tr '.' '-')
                  IMDS_INSTANCE_IDENTITY_DOCUMENT=$(curl -fsS -H "X-aws-ec2-metadata-token: $IMDS_SESSION_TOKEN" http://169.254.169.254/latest/dynamic/instance-identity/document 2>/dev/null || true)
                  IMDS_INSTANCE_REGION=$(echo "$IMDS_INSTANCE_IDENTITY_DOCUMENT" | sed -n 's/.*"region"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
                  if [ -n "$PREVIOUS_HOME_IPV4_EC2_PUBLIC_DNS_LABEL" ] && [ -n "$IMDS_INSTANCE_REGION" ]; then
                    PREVIOUS_HOME_EC2_REGIONAL_PUBLIC_DNS_URL=$(printf 'http://ec2-%s.%s.compute.amazonaws.com' "$PREVIOUS_HOME_IPV4_EC2_PUBLIC_DNS_LABEL" "$IMDS_INSTANCE_REGION")
                    wp_search_replace_if_changed "$PREVIOUS_HOME_EC2_REGIONAL_PUBLIC_DNS_URL" "$NEW_PUBLIC_SITE_URL"
                    if [ "$IMDS_INSTANCE_REGION" = "us-east-1" ]; then
                      PREVIOUS_HOME_EC2_US_EAST_LEGACY_PUBLIC_DNS_URL=$(printf 'http://ec2-%s.compute-1.amazonaws.com' "$PREVIOUS_HOME_IPV4_EC2_PUBLIC_DNS_LABEL")
                      wp_search_replace_if_changed "$PREVIOUS_HOME_EC2_US_EAST_LEGACY_PUBLIC_DNS_URL" "$NEW_PUBLIC_SITE_URL"
                    fi
                  fi
                # Map ec2-* DNS home host back to dotted IPv4 http URL - search-replace when content still references the IPv4 form.
                elif echo "$PREVIOUS_HOME_HOST" | grep -qE '^ec2-[0-9-]+\.'; then
                  PREVIOUS_HOME_EC2_DNS_IPV4_LABEL=$(echo "$PREVIOUS_HOME_HOST" | sed 's/^ec2-\([0-9-]*\)\..*/\1/')
                  if [ -n "$PREVIOUS_HOME_EC2_DNS_IPV4_LABEL" ]; then
                    PREVIOUS_HOME_IPV4_DOTTED_FROM_EC2_DNS_HOST=$(echo "$PREVIOUS_HOME_EC2_DNS_IPV4_LABEL" | awk -F- 'NF>=4 {print $1"."$2"."$3"."$4}')
                    if [ -n "$PREVIOUS_HOME_IPV4_DOTTED_FROM_EC2_DNS_HOST" ]; then
                      PREVIOUS_HOME_HTTP_DOTTED_IPV4_URL=$(printf 'http://%s' "$PREVIOUS_HOME_IPV4_DOTTED_FROM_EC2_DNS_HOST")
                      wp_search_replace_if_changed "$PREVIOUS_HOME_HTTP_DOTTED_IPV4_URL" "$NEW_PUBLIC_SITE_URL"
                    fi
                  fi
                fi
                # When site URL uses hostname - replace leftover http://<ipv4> references in content with that hostname URL.
                if [ -n "$IMDS_PUBLIC_HOSTNAME" ] && [ "$NEW_PUBLIC_SITE_URL" != "http://$IMDS_PUBLIC_IPV4" ]; then
                  wp_search_replace_if_changed "http://$IMDS_PUBLIC_IPV4" "$NEW_PUBLIC_SITE_URL"
                fi
              cwd: /var/www/html
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M
    Properties:
      SubnetId: !Ref SubnetPublicA
      DisableApiTermination: false
      LaunchTemplate:
        LaunchTemplateId: !If
          - HasRestoreSnapshot
          - !Ref WordpressLT
          - !Ref FreshWordpressLT
        Version: !If
          - HasRestoreSnapshot
          - !GetAtt WordpressLT.LatestVersionNumber
          - !GetAtt FreshWordpressLT.LatestVersionNumber
      Tags:
        - Key: Name
          Value: Wordpress-LT-built
        - Key: CfnMetadataNonce
          Value: !Sub '${CfnMetadataNonce}'

# Other resources for WordPress server 
  SGWordpress:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      VpcId: !Ref VPC
      GroupName: wordpress-sg
      GroupDescription: "Allow HTTP traffic to WordPress web server"
      SecurityGroupIngress: 
        - Description: "Allow HTTP IPv4 from anywhere (port 80)"
          IpProtocol: tcp
          FromPort: '80'
          ToPort: '80'
          CidrIp: '0.0.0.0/0'  #Restrict to specific IPs/ranges in production
  WordpressInstanceProfile:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      Path: /
      Roles:
        - !Ref WordpressRole
  WordpressRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
              - ec2.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Path: /
      ManagedPolicyArns: 
        - "arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy"
        - "arn:aws:iam::aws:policy/AmazonSSMFullAccess"
        - "arn:aws:iam::aws:policy/AmazonElasticFileSystemClientFullAccess"
        - "arn:aws:iam::aws:policy/AWSCloudFormationReadOnlyAccess"



Outputs:
  WordpressURL:
    Description: >-
      http:// + instance public DNS when running. Uses PublicDnsName so stack updates still work if the instance is stopped
      (URL may show as http:// until you start the instance again; use WordpressInstanceAutoIP when the instance is running).
    Value: !Sub 'http://${WordpressEC2FromLT.PublicDnsName}'
  WordpressInstanceAutoIP:
    Description: >-
      Ephemeral public IPv4 assigned to WordpressEC2FromLT while running. Absent when stopped.
      Start the instance before stack update if CloudFormation fails resolving this output.
    Value: !GetAtt WordpressEC2FromLT.PublicIp
  WordpressRootSnapshotId:
    Condition: CreateSnapshotStack
    Description: EBS snapshot ID of WordpressEC2FromLT root volume (EnableSnapshotStack set to true).
    Value: !GetAtt WordpressRootEbsSnapshot.SnapshotId
  WordpressRootVolumeId:
    Condition: CreateSnapshotStack
    Description: Root EBS volume ID at time of snapshot.
    Value: !GetAtt WordpressRootEbsSnapshot.VolumeId
  WordpressInstanceId:
    Description: >-
      EC2 instance id of WordpressEC2FromLT.
    Value: !Ref WordpressEC2FromLT    