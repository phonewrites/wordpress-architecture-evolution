# IMPORTANT: Refer to the .md file for instructions on creating the DBPassword
# SecureString parameter manually before deploying this template.
AWSTemplateFormatVersion: 2010-09-09
Transform: 'AWS::LanguageExtensions'
Description: WordPress application AWS architecture evolution - Stage 5 (Auto-scaling EC2 instances with ALB, RDS database, & EFS shared storage)
Parameters:
  LatestAmiId:
    Description: Latest Amazon Linux 2023 AMI.
    #Automatically fetches latest AL2023 AMI ID from AWS Systems Manager
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.12-x86_64'

Resources:

# Network skeleton with all 3 tiers of subnets: Public, Db & App
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.125.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
      - Key: Name
        Value: !Sub 'vpc-${AWS::Region}'
  SubnetPublicA:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      CidrBlock: 10.125.0.0/20
      MapPublicIpOnLaunch: true
      Ipv6CidrBlock: 
        Fn::Sub:
          - "${VpcPart}${SubnetPart}"
          - SubnetPart: '00::/64'
            VpcPart: !Select [ 0, !Split [ '00::/56', !Select [ 0, !GetAtt VPC.Ipv6CidrBlocks ]]]
      Tags:
        - Key: Name
          Value: sn-public-A
  SubnetPublicB:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 1, !GetAZs '' ]
      CidrBlock: 10.125.16.0/20
      MapPublicIpOnLaunch: true
      Ipv6CidrBlock: 
        Fn::Sub:
          - "${VpcPart}${SubnetPart}"
          - SubnetPart: '01::/64'
            VpcPart: !Select [ 0, !Split [ '00::/56', !Select [ 0, !GetAtt VPC.Ipv6CidrBlocks ]]]
      Tags:
        - Key: Name
          Value: sn-public-B
  SubnetPublicC:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 2, !GetAZs '' ]
      CidrBlock: 10.125.32.0/20
      MapPublicIpOnLaunch: true
      Ipv6CidrBlock: 
        Fn::Sub:
          - "${VpcPart}${SubnetPart}"
          - SubnetPart: '02::/64'
            VpcPart: !Select [ 0, !Split [ '00::/56', !Select [ 0, !GetAtt VPC.Ipv6CidrBlocks ]]]
      Tags:
        - Key: Name
          Value: sn-public-C
  SubnetDbA:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      CidrBlock: 10.125.48.0/20
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock: 
        Fn::Sub:
          - "${VpcPart}${SubnetPart}"
          - SubnetPart: '03::/64'
            VpcPart: !Select [ 0, !Split [ '00::/56', !Select [ 0, !GetAtt VPC.Ipv6CidrBlocks ]]]
      Tags:
        - Key: Name
          Value: sn-db-A
  SubnetDbB:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 1, !GetAZs '' ]
      CidrBlock: 10.125.64.0/20
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock: 
        Fn::Sub:
          - "${VpcPart}${SubnetPart}"
          - SubnetPart: '04::/64'
            VpcPart: !Select [ 0, !Split [ '00::/56', !Select [ 0, !GetAtt VPC.Ipv6CidrBlocks ]]]
      Tags:
        - Key: Name
          Value: sn-db-B
  SubnetDbC:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 2, !GetAZs '' ]
      CidrBlock: 10.125.80.0/20
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock: 
        Fn::Sub:
          - "${VpcPart}${SubnetPart}"
          - SubnetPart: '05::/64'
            VpcPart: !Select [ 0, !Split [ '00::/56', !Select [ 0, !GetAtt VPC.Ipv6CidrBlocks ]]]
      Tags:
        - Key: Name
          Value: sn-db-C
  SubnetAppA:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      CidrBlock: 10.125.96.0/20
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock: 
        Fn::Sub:
          - "${VpcPart}${SubnetPart}"
          - SubnetPart: '06::/64'
            VpcPart: !Select [ 0, !Split [ '00::/56', !Select [ 0, !GetAtt VPC.Ipv6CidrBlocks ]]]
      Tags:
        - Key: Name
          Value: sn-app-A
  SubnetAppB:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 1, !GetAZs '' ]
      CidrBlock: 10.125.112.0/20
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock: 
        Fn::Sub:
          - "${VpcPart}${SubnetPart}"
          - SubnetPart: '07::/64'
            VpcPart: !Select [ 0, !Split [ '00::/56', !Select [ 0, !GetAtt VPC.Ipv6CidrBlocks ]]]
      Tags:
        - Key: Name
          Value: sn-app-B
  SubnetAppC:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 2, !GetAZs '' ]
      CidrBlock: 10.125.128.0/20
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock: 
        Fn::Sub:
          - "${VpcPart}${SubnetPart}"
          - SubnetPart: '08::/64'
            VpcPart: !Select [ 0, !Split [ '00::/56', !Select [ 0, !GetAtt VPC.Ipv6CidrBlocks ]]]
      Tags:
        - Key: Name
          Value: sn-app-C
  IPv6CidrBlock:
    Type: AWS::EC2::VPCCidrBlock
    Properties:
      VpcId: !Ref VPC
      AmazonProvidedIpv6CidrBlock: true
  InternetGateway:
    Type: 'AWS::EC2::InternetGateway'
    Properties:
      Tags:
      - Key: Name
        Value: !Sub 'igw-${AWS::Region}'
  InternetGatewayAttachment:
    Type: 'AWS::EC2::VPCGatewayAttachment'
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway
  RTPublic: 
    Type: 'AWS::EC2::RouteTable'
    Properties:
      VpcId: !Ref VPC
      Tags:
      - Key: Name
        Value: !Sub 'vpc-rt-public-${AWS::Region}'
  RTPublicDefaultIPv4: 
    Type: 'AWS::EC2::Route'
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId:
        Ref: RTPublic
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId:
        Ref: InternetGateway
  RTPublicDefaultIPv6: 
    Type: 'AWS::EC2::Route'
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId:
        Ref: RTPublic
      DestinationIpv6CidrBlock: '::/0'
      GatewayId:
        Ref: InternetGateway
  RTAssociationPubA:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref SubnetPublicA
      RouteTableId:
        Ref: RTPublic
  RTAssociationPubB:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref SubnetPublicB
      RouteTableId:
        Ref: RTPublic
  RTAssociationPubC:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref SubnetPublicC
      RouteTableId:
        Ref: RTPublic
  IPv6WorkaroundSubnetPublicA:
    Type: Custom::SubnetModify
    Properties:
      ServiceToken: !GetAtt IPv6WorkaroundLambda.Arn
      SubnetId: !Ref SubnetPublicA
  IPv6WorkaroundSubnetPublicB:
    Type: Custom::SubnetModify
    Properties:
      ServiceToken: !GetAtt IPv6WorkaroundLambda.Arn
      SubnetId: !Ref SubnetPublicB
  IPv6WorkaroundSubnetPublicC:
    Type: Custom::SubnetModify
    Properties:
      ServiceToken: !GetAtt IPv6WorkaroundLambda.Arn
      SubnetId: !Ref SubnetPublicC
  IPv6WorkaroundRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service:
            - lambda.amazonaws.com
          Action:
          - sts:AssumeRole
      Path: "/"
      Policies:
        - PolicyName: !Sub "ipv6-fix-logs-${AWS::StackName}"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
            - Effect: Allow
              Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
              Resource: arn:aws:logs:*:*:*
        - PolicyName: !Sub "ipv6-fix-modify-${AWS::StackName}"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
            - Effect: Allow
              Action:
              - ec2:ModifySubnetAttribute
              Resource: "*"
  IPv6WorkaroundLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: "index.lambda_handler"
      # Custom resource Lambda to enable IPv6 auto-assignment on public subnets
      # (CloudFormation doesn't natively support this via AssignIpv6AddressOnCreation)
      Code: # cfnresponse import required to send response back to CloudFormation
        ZipFile:
          Fn::Sub: |
            import cfnresponse
            import boto3

            def lambda_handler(event, context):
                if event['RequestType'] == 'Delete':
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, event.get('PhysicalResourceId', 'delete'))
                  return

                responseValue = event['ResourceProperties']['SubnetId']
                ec2 = boto3.client('ec2', region_name='${AWS::Region}')
                ec2.modify_subnet_attribute(AssignIpv6AddressOnCreation={
                                                'Value': True
                                              },
                                              SubnetId=responseValue)
                responseData = {}
                responseData['SubnetId'] = responseValue
                cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData, "CustomResourcePhysicalID")
      Runtime: python3.9
      Role: !GetAtt IPv6WorkaroundRole.Arn
      Timeout: 30

# SSM Parameters for WordPress configuration
  DBName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/Wordpress/DBName"
      Description: "Wordpress Database Name"
      Type: String
      Value: "wordpressdb"
  DBUser:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/Wordpress/DBUser"
      Description: "Wordpress Database User"
      Type: String
      Value: "wordpressuser"
  DBEndpoint:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/Wordpress/DBEndpoint"
      Description: "Wordpress Endpoint Name"
      Type: String
      #Stage 3+: Points to RDS MySQL endpoint (not localhost)
      Value: !GetAtt RDSinstance.Endpoint.Address
  EFSfsid:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/Wordpress/EFSfsid"
      Description: "File System ID of the EFS resource for storing Wordpress content"
      Type: String
      #Stage 4+: EFS file system ID for shared wp-content across instances
      Value: !GetAtt WordpressEFS.FileSystemId
  ALBDNSName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/Wordpress/ALBDNSName" 
      Description: "DNS Name of the wordpress-alb"
      Type: String
      #Stage 5: ALB DNS used for WordPress URLs
      Value: !GetAtt WordpressALB.DNSName

# WordPress auto-scaling with ALB + ASG + RDS + EFS
  SGWordpress:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      VpcId: !Ref VPC
      GroupName: wordpress-sg
      GroupDescription: "Restricted access to Wordpress instances"
      SecurityGroupIngress: 
        - Description: "Allow HTTP IPv4 from anywhere (port 80)"
          IpProtocol: tcp
          FromPort: '80'
          ToPort: '80'
          CidrIp: '0.0.0.0/0'  #Restrict to ALB security group only in production
  SGDatabase:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      VpcId: !Ref VPC
      GroupName: database-sg
      GroupDescription: "Allow MySQL connections from WordPress instances only"
      SecurityGroupIngress: 
        - Description: "Allow MySQL from WordPress security group (port 3306)"
          IpProtocol: tcp
          FromPort: '3306'
          ToPort: '3306'
          SourceSecurityGroupId: !Ref SGWordpress  #Only WordPress can connect
  SGEFS:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      VpcId: !Ref VPC
      GroupName: efs-sg
      GroupDescription: "Allow NFS connections from WordPress instances only"
      SecurityGroupIngress: 
        - Description: "Allow NFS from WordPress security group (port 2049)"
          IpProtocol: tcp
          FromPort: '2049'
          ToPort: '2049'
          SourceSecurityGroupId: !Ref SGWordpress  #Only WordPress can mount EFS
  SGALB:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      VpcId: !Ref VPC
      GroupName: alb-sg
      GroupDescription: "Allow HTTP traffic to Application Load Balancer"
      SecurityGroupIngress: 
        - Description: "Allow HTTP IPv4 from anywhere (port 80)"
          IpProtocol: tcp
          FromPort: '80'
          ToPort: '80'
          CidrIp: '0.0.0.0/0'  # Production: use CloudFront or restrict as needed
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      Path: /
      Roles:
        - !Ref WordpressRole
  WordpressRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
              - ec2.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Path: /
      ManagedPolicyArns: 
        - "arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy"
        - "arn:aws:iam::aws:policy/AmazonSSMFullAccess"
        - "arn:aws:iam::aws:policy/AmazonElasticFileSystemClientFullAccess"

 #Launch template for ASG instances: app only, EFS for content, ALB DNS for WordPress URLs
  WordpressLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    DependsOn:
      - DBName
      - DBUser    
      - DBEndpoint
      - EFSfsid
      - ALBDNSName
    Properties:
      LaunchTemplateName: "Wordpress"
      VersionDescription: "Launches app only. Uses EFS for content. ALB home added to WP Database."
      LaunchTemplateData: 
        ImageId: !Ref LatestAmiId
        InstanceType: t2.micro
        SecurityGroupIds:
          - !GetAtt SGWordpress.GroupId
        IamInstanceProfile:
          Arn: !GetAtt WordpressInstanceProfile.Arn
        #Allow instance termination for testing
        DisableApiTermination: false
        CreditSpecification:
          CpuCredits: Standard
        MetadataOptions:
          HttpEndpoint: enabled
          HttpTokens: required
          HttpPutResponseHopLimit: 2
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash -xe
            # Step 1 - Import parameter store values
            DBName=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/DBName --query Parameters[0].Value --output text)
            DBUser=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/DBUser --query Parameters[0].Value --output text)
            DBPassword=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/DBPassword --with-decryption --query Parameters[0].Value --output text)
            DBEndpoint=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/DBEndpoint --query Parameters[0].Value --output text)
            EFSfsid=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/EFSfsid --query Parameters[0].Value --output text)
            ALBDNSName=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/ALBDNSName --query Parameters[0].Value --output text)
            # Step 2 - System Updates
            dnf -y update
            dnf -y upgrade
            # Step 3 - Install system software - Web server only (no local database)
            dnf install wget httpd php php-mysqlnd php-fpm php-mysqli php-json php-mbstring php-xml php-gd php-opcache php-intl php-zip php-devel stress amazon-efs-utils -y
            # Step 4 - Web Server Online - and set to startup
            systemctl enable httpd
            systemctl start httpd
            # Step 5 - Download & install Wordpress BEFORE mounting EFS
            wget https://wordpress.org/latest.tar.gz -P /var/www/html
            cd /var/www/html
            tar -zxvf latest.tar.gz
            cp -rvf wordpress/* .
            rm -R wordpress
            rm latest.tar.gz
            # Step 6 - Configure Wordpress
            cp ./wp-config-sample.php ./wp-config.php
            sed -i "s/'database_name_here'/'$DBName'/g" wp-config.php
            sed -i "s/'username_here'/'$DBUser'/g" wp-config.php
            sed -i "s/'password_here'/'$DBPassword'/g" wp-config.php
            sed -i "s/'localhost'/'$DBEndpoint'/g" wp-config.php
            # Step 7 - Migrate wp-content to EFS
            mkdir -p /var/www/html/wp-content-backup
            cp -r /var/www/html/wp-content/* /var/www/html/wp-content-backup/
            rm -rf /var/www/html/wp-content
            mkdir -p /var/www/html/wp-content
            echo -e "$EFSfsid:/ /var/www/html/wp-content efs _netdev,tls,iam 0 0" >> /etc/fstab
            mount -a -t efs defaults
            cp -r /var/www/html/wp-content-backup/* /var/www/html/wp-content/
            rm -rf /var/www/html/wp-content-backup
            # Step 8 - Fix the permissions
            usermod -a -G apache ec2-user   
            chown -R ec2-user:apache /var/www
            chmod 2775 /var/www
            find /var/www -type d -exec chmod 2775 {} \;
            find /var/www -type f -exec chmod 0664 {} \;
            # Step 9 - Nested script to point Wordpress app's home to the DNS name of wordpress-alb
            cat >> /home/ec2-user/ip-update.sh<< 'EOF'
            #!/bin/bash
            source <(php -r 'require("/var/www/html/wp-config.php"); echo("DB_NAME=".DB_NAME."; DB_USER=".DB_USER."; DB_PASSWORD=".DB_PASSWORD."; DB_HOST=".DB_HOST); ')
            SQL_COMMAND="mysql -u $DB_USER -h $DB_HOST -p$DB_PASSWORD $DB_NAME -e"
            OLD_URL=$(mysql -u $DB_USER -h $DB_HOST -p$DB_PASSWORD $DB_NAME -e 'select option_value from wp_options where option_id = 1;' | grep http)
            ALBDNSName=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/ALBDNSName --query Parameters[0].Value --output text)
            $SQL_COMMAND "UPDATE wp_options SET option_value = replace(option_value, '$OLD_URL', 'http://$ALBDNSName') WHERE option_name = 'home' OR option_name = 'siteurl';"
            $SQL_COMMAND "UPDATE wp_posts SET guid = replace(guid, '$OLD_URL','http://$ALBDNSName');"
            $SQL_COMMAND "UPDATE wp_posts SET post_content = replace(post_content, '$OLD_URL', 'http://$ALBDNSName');"
            $SQL_COMMAND "UPDATE wp_postmeta SET meta_value = replace(meta_value,'$OLD_URL','http://$ALBDNSName');"
            EOF
            chmod 755 /home/ec2-user/ip-update.sh
            echo "/home/ec2-user/ip-update.sh" >> /etc/rc.local
            /home/ec2-user/ip-update.sh

# RDS resources needed to split Database from the WordpressEC2 instance
  RDSSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: "WordPressRDSSubnetGroup"     
      DBSubnetGroupDescription: "RDS Subnet Group for the WordPress DB"
      SubnetIds: 
        - !Ref SubnetDbA
        - !Ref SubnetDbB
        - !Ref SubnetDbC
      Tags:
        - Key: Name
          Value: "WordPressRDSSubnetGroup"
  RDSinstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    Properties:
      Engine: mysql
      #Mandatory MySQL parameter aka "Initial database name" in console
      DBName: !GetAtt DBName.Value 
      #Free tier eligible settings
      EngineVersion: 8.4 #Latest MySQL LTS
      DBInstanceClass: "db.t3.micro"
      AllocatedStorage: 20     
      StorageType: gp3
      #Default settings
      # NetworkType: IPV4
      # PubliclyAccessible: false
      MultiAZ: false
      DBInstanceIdentifier: !GetAtt DBName.Value
      MasterUsername: !GetAtt DBUser.Value
      MasterUserPassword: "{{resolve:ssm-secure:/Wordpress/DBPassword}}"
      DBSubnetGroupName: !Ref RDSSubnetGroup
      VPCSecurityGroups:
        - !Ref SGDatabase
      AvailabilityZone: !GetAtt SubnetPublicA.AvailabilityZone

# EFS for shared WordPress content across instances
  WordpressEFS:
    Type: 'AWS::EFS::FileSystem'
    Properties:
      FileSystemTags:
        - Key: Name
          Value: "wordpress-efs"
      BackupPolicy:
        Status: ENABLED
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS
      Encrypted: false
      ThroughputMode: bursting
      PerformanceMode: generalPurpose
  Fn::ForEach::MountTargets:
    - zone
    - [A, B, C]
    - 'MountTarget${zone}':
        Type: AWS::EFS::MountTarget
        Properties:
          FileSystemId: !Ref WordpressEFS
          SubnetId:
            Ref:
              !Sub 'SubnetApp${zone}'
          SecurityGroups:
            - !GetAtt SGEFS.GroupId

# Application Load Balancer for distributing traffic
  WordpressALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: "wordpress-alb"
      #Application Load Balancer in public subnets for internet access
      Subnets: 
        - !Ref SubnetPublicA
        - !Ref SubnetPublicB
        - !Ref SubnetPublicC
      SecurityGroups: 
        - !Ref SGALB
  WordpressALBHttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref WordpressALB
      Protocol: HTTP
      Port: 80
      DefaultActions: 
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup
  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: wordpress-alb-tg
      TargetType: instance
      Protocol: HTTP
      Port: 80
      VpcId: !Ref VPC
      #Default settings
      # HealthCheckEnabled: true
      # HealthCheckProtocol: HTTP
      # HealthCheckPath: '/'
      ProtocolVersion:  HTTP1

# Auto Scaling Group for WordPress instances
  WordpressASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    DependsOn: InternetGatewayAttachment
    Properties:
      AutoScalingGroupName: wordpress-asg
      LaunchTemplate:
          LaunchTemplateId: !Ref WordpressLaunchTemplate
          Version: !GetAtt WordpressLaunchTemplate.LatestVersionNumber
      VPCZoneIdentifier: [!Ref SubnetPublicA,!Ref SubnetPublicB,!Ref SubnetPublicC]
      TargetGroupARNs: [!Ref ALBTargetGroup]
      HealthCheckType: ELB  #Use ALB health checks (not just EC2 status checks)
      HealthCheckGracePeriod: 300  #Wait 5 min for instance to fully initialize
      MetricsCollection: [Granularity: 1Minute]  #Detailed CloudWatch metrics
      DesiredCapacity: 1  #Normal operating state
      MinSize: 1  #Always keep at least one instance running
      MaxSize: 3  #Never exceed 3 instances (cost control)
      Tags:
        - Key: Name
          Value: wordpress-asg
          PropagateAtLaunch: true

# Auto-scaling policies: Hybrid approach with CPU credits + CPU utilization
  #For "M out of N" alarm, M = DatapointsToAlarm & N = EvaluationPeriods

  #Scale-out Policy #1: Low CPU credits (t2.micro resource constraint)
  WpLowCreditScaleOut:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WordpressASG
      PolicyType: SimpleScaling
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: 1
      Cooldown: 300
  WpLowCreditAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "CPU Credits Low - Scale Out" 
      MetricName: 'CPUCreditBalance'
      Namespace: 'AWS/EC2'
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref WordpressASG      
      Statistic: 'Minimum'  #Detects if ANY instance is critically low
      Period: 120  #2-minute evaluation periods
      Threshold: 3  #Critical threshold (t2.micro has max 144 credits)
      ComparisonOperator: LessThanThreshold
      #Alarm triggers when 3 out of 4 datapoints are below threshold (6-8 minutes)
      DatapointsToAlarm: 3
      EvaluationPeriods: 4
      AlarmDescription: "Scale out when ANY instance drops below 3 credits (3 of 4 datapoints = critically low burst capacity)"
      AlarmActions: [!Ref WpLowCreditScaleOut ]

  #Scale-out Policy #2: High CPU utilization (normal scaling)
  WpHighCpuScaleOut:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WordpressASG
      PolicyType: SimpleScaling
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: 1
      Cooldown: 300
  WpHighCpuAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "CPU Utilization High - Scale Out" 
      MetricName: 'CPUUtilization'
      Namespace: 'AWS/EC2'
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref WordpressASG      
      Statistic: 'Average'  #Average across all instances in ASG
      Period: 120  #2-minute evaluation periods
      Threshold: 50  #50% sustained utilization warrants scaling
      ComparisonOperator: GreaterThanThreshold
      #Alarm triggers when 2 out of 3 datapoints exceed threshold (4-6 minutes)
      DatapointsToAlarm: 2
      EvaluationPeriods: 3
      AlarmDescription: "Scale out when CPU >50% for 4-6 min (sustained high load with available credits)"
      AlarmActions: [!Ref WpHighCpuScaleOut ]

  #Scale-in Policy: Low CPU utilization
  WpLowCpuScaleIn:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WordpressASG
      PolicyType: SimpleScaling
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: -1
      Cooldown: 300
  WpLowCpuAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "CPU Utilization Low - Scale In"
      MetricName: 'CPUUtilization'
      Namespace: 'AWS/EC2'
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref WordpressASG
      Statistic: 'Average'  #Average across all instances
      Period: 120  #2-minute evaluation periods
      Threshold: 15  #Low threshold (idle or minimal load)
      ComparisonOperator: LessThanThreshold
      #Alarm triggers when 2 out of 3 datapoints are below threshold (~6 minutes)
      DatapointsToAlarm: 2
      EvaluationPeriods: 3
      AlarmDescription: "Scale in when CPU <15% for ~6 min"
      AlarmActions: [!Ref WpLowCpuScaleIn ]

Outputs:
  WordpressURL:
    Description: Access WordPress installation at this URL (ALB DNS)
    Value: !Sub 'http://${WordpressALB.DNSName}'
