# IMPORTANT: Refer to the .md file for instructions on creating the DBPassword
# SecureString parameter manually before deploying this template.
AWSTemplateFormatVersion: 2010-09-09
Description: >-
  WordPress application AWS architecture evolution - Stage 3
  Application server with separate RDS database.
Parameters:
  LatestAmiId:
    Description: Latest Amazon Linux 2023 AMI.
    #Automatically fetches latest AL2023 AMI ID from AWS Systems Manager
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.18-x86_64'
  MigrateFromStage2LocalMariaDb:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >-
      true: Allows same stack upgrade from stage 2: run mysqldump on the existing WordPress EC2 (local MariaDB) and import into RDS via SSM
      RunCommand, then stop MariaDB and point wp-config at RDS.
      false: greenfield deployment.
  SourceWordpressInstanceId:
    Type: String
    Default: ''
    AllowedPattern: '^$|^i-[a-f0-9]+$'
    ConstraintDescription: Empty or an EC2 instance id (i- followed by lowercase hex).
    Description: >-
      Enter the stage 2 WordpressInstanceId output from last stack create/update; Ignored if MigrateFromStage2LocalMariaDb is false
  CfnMetadataNonce:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 2147483647
    Description: >-
      Positive integer; increase on stack update so WordpressEC2 Metadata changes and cfn-hup re-runs cfn-init.
  UploadsSourceEbsSnapshotId:
    Type: String
    Default: ''
    AllowedPattern: '^$|^snap-[a-z0-9]+$'
    ConstraintDescription: Empty or an EBS snapshot id (snap- followed by lowercase hex).
    Description: >-
      Empty: Greenfield stage3 stack.
      Non-empty: EBS snapshot id whose filesystem contains the old WordPress tree;
      For stage2 to stage3 stack update: Use WordpressRootSnapshotId output from a stage2 update that created it.

Rules:
  InstanceIdRequiredWhenMigrate:
    RuleCondition: !Equals [!Ref MigrateFromStage2LocalMariaDb, 'true']
    Assertions:
      - Assert: !Not [!Equals [!Ref SourceWordpressInstanceId, '']]
        AssertDescription: >-
          Set SourceWordpressInstanceId to the running stage 2 WordPress EC2 instance id when MigrateFromStage2LocalMariaDb is true.

Conditions:
  RunLocalMariaToRdsMigration: !And
    - !Equals [!Ref MigrateFromStage2LocalMariaDb, 'true']
    - !Not [!Equals [!Ref SourceWordpressInstanceId, '']]
  HasUploadsSourceEbsSnapshot: !Not [!Equals [!Ref UploadsSourceEbsSnapshotId, '']]

Resources:
# Network skeleton with Db subnets added for RDS resources (2 tiers: Public/App + Db)
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.125.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
      - Key: Name
        Value: !Sub 'vpc-${AWS::Region}'
  SubnetPublicA:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      CidrBlock: 10.125.0.0/20
      MapPublicIpOnLaunch: true
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock:
        Fn::Sub:
          - "${VpcPart}${SubnetPart}"
          - SubnetPart: '00::/64'
            VpcPart: !Select [ 0, !Split [ '00::/56', !Select [ 0, !GetAtt VPC.Ipv6CidrBlocks ]]]
      Tags:
        - Key: Name
          Value: sn-public-A
  SubnetPublicB:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 1, !GetAZs '' ]
      CidrBlock: 10.125.16.0/20
      MapPublicIpOnLaunch: true
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock:
        Fn::Sub:
          - "${VpcPart}${SubnetPart}"
          - SubnetPart: '01::/64'
            VpcPart: !Select [ 0, !Split [ '00::/56', !Select [ 0, !GetAtt VPC.Ipv6CidrBlocks ]]]
      Tags:
        - Key: Name
          Value: sn-public-B
  SubnetPublicC:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 2, !GetAZs '' ]
      CidrBlock: 10.125.32.0/20
      MapPublicIpOnLaunch: true
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock:
        Fn::Sub:
          - "${VpcPart}${SubnetPart}"
          - SubnetPart: '02::/64'
            VpcPart: !Select [ 0, !Split [ '00::/56', !Select [ 0, !GetAtt VPC.Ipv6CidrBlocks ]]]
      Tags:
        - Key: Name
          Value: sn-public-C
  SubnetDbA:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      CidrBlock: 10.125.48.0/20
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock: 
        Fn::Sub:
          - "${VpcPart}${SubnetPart}"
          - SubnetPart: '03::/64'
            VpcPart: !Select [ 0, !Split [ '00::/56', !Select [ 0, !GetAtt VPC.Ipv6CidrBlocks ]]]
      Tags:
        - Key: Name
          Value: sn-db-A
  SubnetDbB:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 1, !GetAZs '' ]
      CidrBlock: 10.125.64.0/20
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock: 
        Fn::Sub:
          - "${VpcPart}${SubnetPart}"
          - SubnetPart: '04::/64'
            VpcPart: !Select [ 0, !Split [ '00::/56', !Select [ 0, !GetAtt VPC.Ipv6CidrBlocks ]]]
      Tags:
        - Key: Name
          Value: sn-db-B
  SubnetDbC:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 2, !GetAZs '' ]
      CidrBlock: 10.125.80.0/20
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock: 
        Fn::Sub:
          - "${VpcPart}${SubnetPart}"
          - SubnetPart: '05::/64'
            VpcPart: !Select [ 0, !Split [ '00::/56', !Select [ 0, !GetAtt VPC.Ipv6CidrBlocks ]]]
      Tags:
        - Key: Name
          Value: sn-db-C
  IPv6CidrBlock:
    Type: AWS::EC2::VPCCidrBlock
    Properties:
      VpcId: !Ref VPC
      AmazonProvidedIpv6CidrBlock: true
  InternetGateway:
    Type: 'AWS::EC2::InternetGateway'
    Properties:
      Tags:
      - Key: Name
        Value: !Sub 'igw-${AWS::Region}'
  InternetGatewayAttachment:
    Type: 'AWS::EC2::VPCGatewayAttachment'
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway
  RTPublic: 
    Type: 'AWS::EC2::RouteTable'
    Properties:
      VpcId: !Ref VPC
      Tags:
      - Key: Name
        Value: !Sub 'vpc-rt-public-${AWS::Region}'
  RTPublicDefaultIPv4: 
    Type: 'AWS::EC2::Route'
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId:
        Ref: RTPublic
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId:
        Ref: InternetGateway
  RTPublicDefaultIPv6: 
    Type: 'AWS::EC2::Route'
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId:
        Ref: RTPublic
      DestinationIpv6CidrBlock: '::/0'
      GatewayId:
        Ref: InternetGateway
  RTAssociationPubA:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref SubnetPublicA
      RouteTableId:
        Ref: RTPublic
  RTAssociationPubB:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref SubnetPublicB
      RouteTableId:
        Ref: RTPublic
  RTAssociationPubC:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref SubnetPublicC
      RouteTableId:
        Ref: RTPublic

# SSM Parameters for WordPress configuration
  DBName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/Wordpress/DBName"
      Description: "Wordpress Database Name"
      Type: String
      Value: "wordpressdb"
  DBUser:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/Wordpress/DBUser"
      Description: "Wordpress Database User"
      Type: String
      Value: "wordpressuser"
  DBEndpoint:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/Wordpress/DBEndpoint"
      Description: "Wordpress Endpoint Name"
      Type: String
      #Stage 3: Points to RDS MySQL endpoint (replaces localhost from Stage 1-2)
      Value: !GetAtt RDSinstance.Endpoint.Address

# Optional resources for stack update from stage2 to stage3
  RdsLocalMariaMigrateRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: !Sub rds-migrate-ssm-${AWS::StackName}
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                  - ssm:ListCommandInvocations
                Resource: '*'

  RdsLocalMariaMigrateLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.12
      Role: !GetAtt RdsLocalMariaMigrateRole.Arn
      Timeout: 900
      Code:
        ZipFile: |
          import cfnresponse
          import boto3
          import time
          # For stage 2 to stage 3 migration: Run SSM on source EC2. Skip on disabled migration or Delete.
          def handler(event, context):
              phys = event.get("PhysicalResourceId") or "rds-migrate"
              try:
                  if event["RequestType"] == "Delete":
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, phys)
                      return
                  props = event["ResourceProperties"]
                  if str(props.get("EnableMigration", "false")).lower() != "true":
                      cfnresponse.send(
                          event, context, cfnresponse.SUCCESS, {"Skipped": "true"}, phys + "-skip"
                      )
                      return
                  region = props["Region"]
                  inst = (props.get("SourceInstanceId") or "").strip()
                  if not inst.startswith("i-"):
                      raise ValueError("SourceInstanceId must be an EC2 instance id")
                  rds_host = (props.get("RdsAddress") or "").strip()
                  if not rds_host:
                      raise ValueError("RdsAddress empty")
                  rds_port = str(props.get("RdsPort") or "3306")
                  lines = [
                      "#!/bin/bash",
                      "set -euo pipefail",
                      "REGION=" + repr(region),
                      "RDS_ENDPOINT=" + repr(rds_host),
                      "RDS_PORT=" + repr(rds_port),
                      "DUMP=/tmp/cfn-wp-rds-migrate.sql",
                      'DBName=$(aws ssm get-parameters --region "$REGION" --names /Wordpress/DBName --query Parameters[0].Value --output text)',
                      'DBUser=$(aws ssm get-parameters --region "$REGION" --names /Wordpress/DBUser --query Parameters[0].Value --output text)',
                      'DBPassword=$(aws ssm get-parameters --region "$REGION" --names /Wordpress/DBPassword --with-decryption --query Parameters[0].Value --output text)',
                      'mysqldump -h127.0.0.1 -u"$DBUser" -p"$DBPassword" "$DBName" > "$DUMP"',
                      'mysql -h"$RDS_ENDPOINT" -P"$RDS_PORT" -u"$DBUser" -p"$DBPassword" "$DBName" < "$DUMP"',
                      'rm -f "$DUMP"',
                      "systemctl disable mariadb 2>/dev/null || true",
                      "systemctl stop mariadb 2>/dev/null || true",
                      'if [ -f /var/www/html/wp-config.php ]; then',
                      '  sed -i "s/\'localhost\'/\'${RDS_ENDPOINT}\'/g" /var/www/html/wp-config.php || true',
                      '  sed -i "s/\'127.0.0.1\'/\'${RDS_ENDPOINT}\'/g" /var/www/html/wp-config.php || true',
                      "fi",
                  ]
                  script = "\n".join(lines) + "\n"
                  ssm = boto3.client("ssm", region_name=region)
                  resp = ssm.send_command(
                      InstanceIds=[inst],
                      DocumentName="AWS-RunShellScript",
                      Parameters={"commands": [script]},
                      TimeoutSeconds=600,
                  )
                  cid = resp["Command"]["CommandId"]
                  for _ in range(150):
                      time.sleep(4)
                      inv = ssm.get_command_invocation(CommandId=cid, InstanceId=inst)
                      st = inv["Status"]
                      if st in ("Success", "Cancelled", "Failed", "TimedOut", "Cancelling"):
                          break
                  else:
                      raise TimeoutError("SSM command timed out")
                  inv = ssm.get_command_invocation(CommandId=cid, InstanceId=inst)
                  if inv["Status"] != "Success":
                      err = (inv.get("StandardErrorContent") or "")[:4096]
                      raise RuntimeError(err or inv["Status"])
                  cfnresponse.send(
                      event,
                      context,
                      cfnresponse.SUCCESS,
                      {"InstanceId": inst, "CommandId": cid},
                      inst + "-" + cid,
                  )
              except Exception as e:
                  print(repr(e))
                  cfnresponse.send(
                      event,
                      context,
                      cfnresponse.FAILED,
                      {"Error": str(e)[:2048]},
                      phys,
                  )

  LocalMariaDbToRdsMigration:
    Type: Custom::LocalMariaDbToRdsMigration
    DependsOn: RDSinstance
    Properties:
      ServiceToken: !GetAtt RdsLocalMariaMigrateLambda.Arn
      EnableMigration: !If [RunLocalMariaToRdsMigration, 'true', 'false']
      SourceInstanceId: !Ref SourceWordpressInstanceId
      RdsAddress: !GetAtt RDSinstance.Endpoint.Address
      RdsPort: !GetAtt RDSinstance.Endpoint.Port
      Region: !Ref AWS::Region

  WordpressUploadsSourceVolume:
    Type: AWS::EC2::Volume
    Condition: HasUploadsSourceEbsSnapshot
    Properties:
      AvailabilityZone: !GetAtt SubnetPublicA.AvailabilityZone
      SnapshotId: !Ref UploadsSourceEbsSnapshotId
      VolumeType: gp3
      Tags:
        - Key: Name
          Value: !Sub 'Wordpress-uploads-source'

  # WordPress server Launch Template: app tier only
  WordpressAppTierLT:
    Type: AWS::EC2::LaunchTemplate
    DependsOn:
      - DBName
      - DBUser    
      - DBEndpoint
    Properties:
      LaunchTemplateName: "Wordpress-app-only"
      VersionDescription: Launches WordPress app tier only (RDS for database)
      LaunchTemplateData: 
        ImageId: !Ref LatestAmiId
        InstanceType: t2.micro
        SecurityGroupIds:
          - !GetAtt SGWordpress.GroupId
        IamInstanceProfile:
          Arn: !GetAtt WordpressInstanceProfile.Arn          
        DisableApiTermination: true
        CreditSpecification:
          CpuCredits: Standard
        MetadataOptions:
          HttpEndpoint: enabled
          HttpTokens: required
          HttpPutResponseHopLimit: 2
        UserData:
          Fn::Base64: !Sub
            - |
              #!/bin/bash
              # Set UploadsSourceEbsSnapshotId to snap-… when copying uploads from an existing/stage2 root snapshot - leave empty for greenfield.
              SNAPSHOT_ID="${UploadsSourceEbsSnapshotId}"
              UPLOADS_EBS_VOLUME_ID="${UploadsCfnVolumeId}"
              if ! rpm -q aws-cfn-bootstrap >/dev/null 2>&1; then dnf install -y aws-cfn-bootstrap; fi
              _cfn_exit() {
                local s=$?
                if [ -x /opt/aws/bin/cfn-signal ]; then
                  /opt/aws/bin/cfn-signal -e "$s" --stack ${AWS::StackId} --resource WordpressEC2 --region ${AWS::Region}
                fi
              }
              trap _cfn_exit EXIT
              set -xe
              # Step 1 - Import parameter store values
              DBName=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/DBName --query Parameters[0].Value --output text)
              DBUser=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/DBUser --query Parameters[0].Value --output text)
              DBEndpoint=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/DBEndpoint --query Parameters[0].Value --output text)
              DBPassword=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/DBPassword --with-decryption --query Parameters[0].Value --output text)
              # Step 1b - Wait for uploads snapshot volume to be attachable - force-detach from another instance after ~2 min if needed - attach to this instance - wait for block device nodes.
              if [ -n "$SNAPSHOT_ID" ] && [ -n "$UPLOADS_EBS_VOLUME_ID" ]; then
                TOKEN_IMDS=$(curl -fsS -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
                INSTANCE_IMDS=$(curl -fsS -H "X-aws-ec2-metadata-token: $TOKEN_IMDS" http://169.254.169.254/latest/meta-data/instance-id)
                UPLOADS_SNAPSHOT_VOLUME_STATE=""
                UPLOADS_VOLUME_ATTACHED_INSTANCE_ID=""
                UPLOADS_VOLUME_FORCE_DETACH_DONE=""
                set +e
                for waitvol in $(seq 1 360); do
                  UPLOADS_SNAPSHOT_VOLUME_STATE=$(aws ec2 describe-volumes --region ${AWS::Region} --volume-ids "$UPLOADS_EBS_VOLUME_ID" --query 'Volumes[0].State' --output text 2>/dev/null || true)
                  UPLOADS_VOLUME_ATTACHED_INSTANCE_ID=$(aws ec2 describe-volumes --region ${AWS::Region} --volume-ids "$UPLOADS_EBS_VOLUME_ID" --query 'Volumes[0].Attachments[0].InstanceId' --output text 2>/dev/null || true)
                  [ "$UPLOADS_VOLUME_ATTACHED_INSTANCE_ID" = "None" ] && UPLOADS_VOLUME_ATTACHED_INSTANCE_ID=""
                  if [ "$UPLOADS_SNAPSHOT_VOLUME_STATE" = "available" ]; then
                    break
                  fi
                  if [ "$UPLOADS_SNAPSHOT_VOLUME_STATE" = "in-use" ] && [ "$UPLOADS_VOLUME_ATTACHED_INSTANCE_ID" = "$INSTANCE_IMDS" ]; then
                    break
                  fi
                  if [ -z "$UPLOADS_VOLUME_FORCE_DETACH_DONE" ] && [ "$waitvol" -ge 24 ] && [ "$UPLOADS_SNAPSHOT_VOLUME_STATE" = "in-use" ] && [ -n "$UPLOADS_VOLUME_ATTACHED_INSTANCE_ID" ] && [ "$UPLOADS_VOLUME_ATTACHED_INSTANCE_ID" != "$INSTANCE_IMDS" ]; then
                    echo "uploads volume: force-detach $UPLOADS_EBS_VOLUME_ID from $UPLOADS_VOLUME_ATTACHED_INSTANCE_ID (new instance $INSTANCE_IMDS, attempt=$waitvol)" >&2
                    aws ec2 detach-volume --region ${AWS::Region} --volume-id "$UPLOADS_EBS_VOLUME_ID" --force 2>/dev/null || true
                    UPLOADS_VOLUME_FORCE_DETACH_DONE=1
                  fi
                  if [ "$((waitvol % 12))" -eq 0 ]; then
                    echo "uploads volume wait: vol=$UPLOADS_EBS_VOLUME_ID state=$UPLOADS_SNAPSHOT_VOLUME_STATE attached_instance=$UPLOADS_VOLUME_ATTACHED_INSTANCE_ID this=$INSTANCE_IMDS attempt=$waitvol/360" >&2
                  fi
                  sleep 5
                done
                set -e
                if [ "$UPLOADS_SNAPSHOT_VOLUME_STATE" = "in-use" ] && [ "$UPLOADS_VOLUME_ATTACHED_INSTANCE_ID" = "$INSTANCE_IMDS" ]; then
                  aws ec2 wait volume-in-use --region ${AWS::Region} --volume-ids "$UPLOADS_EBS_VOLUME_ID"
                elif [ "$UPLOADS_SNAPSHOT_VOLUME_STATE" = "available" ]; then
                  aws ec2 attach-volume --region ${AWS::Region} --volume-id "$UPLOADS_EBS_VOLUME_ID" --instance-id "$INSTANCE_IMDS" --device /dev/sdf
                  aws ec2 wait volume-in-use --region ${AWS::Region} --volume-ids "$UPLOADS_EBS_VOLUME_ID"
                else
                  echo "FATAL: uploads snapshot volume $UPLOADS_EBS_VOLUME_ID not attachable (state=$UPLOADS_SNAPSHOT_VOLUME_STATE attached_instance=$UPLOADS_VOLUME_ATTACHED_INSTANCE_ID this=$INSTANCE_IMDS)" >&2
                  exit 1
                fi
                for attempt in $(seq 1 90); do
                  ( [ -b /dev/xvdf1 ] || [ -b /dev/sdf1 ] || [ -b /dev/nvme1n1p1 ] || [ -b /dev/nvme2n1p1 ] || [ -b /dev/sdf ] || [ -b /dev/xvdf ] || [ -b /dev/nvme1n1 ] || [ -b /dev/nvme2n1 ] ) && break
                  sleep 2
                done
              fi
              # Step 2 - Run system updates
              dnf -y --refresh upgrade
              # Step 3 - Install system software - Web server only (no local database)
              dnf install -y wget httpd php php-mysqlnd php-fpm php-mysqli php-json php-mbstring php-xml php-gd php-opcache php-intl php-zip php-devel
              # Step 4 - Web Server Online - and set to startup
              systemctl enable httpd
              systemctl start httpd
              # Step 5 - Download & install Wordpress
              wget https://wordpress.org/latest.tar.gz -P /var/www/html
              cd /var/www/html
              tar -zxvf latest.tar.gz
              cp -rvf wordpress/* .
              rm -R wordpress
              rm latest.tar.gz
              # Step 6 - Configure Wordpress
              cp ./wp-config-sample.php ./wp-config.php
              sed -i "s/'database_name_here'/'$DBName'/g" wp-config.php
              sed -i "s/'username_here'/'$DBUser'/g" wp-config.php
              sed -i "s/'password_here'/'$DBPassword'/g" wp-config.php
              sed -i "s/'localhost'/'$DBEndpoint'/g" wp-config.php
              # Step 7 - Use the browser address for Wordpress site links (echo avoids YAML/heredoc indent clash under Fn::Sub list)
              if ! grep -q 'Follow browser hostname for WP_HOME' wp-config.php; then
                WPCONFIG_INSERT_TMP=$(mktemp)
                WPCONFIG_MERGED_TMP=$(mktemp)
                {
                  echo '            /* Follow browser hostname for WP_HOME and WP_SITEURL (HTTP_HOST; no fixed public IP in redirects). */'
                  echo '            if (php_sapi_name() !== '\''cli'\'' && !empty($_SERVER['\''HTTP_HOST'\''])) {'
                  echo '                define('\''WP_HOME'\'', '\''http://'\'' . $_SERVER['\''HTTP_HOST'\'']);'
                  echo '                define('\''WP_SITEURL'\'', '\''http://'\'' . $_SERVER['\''HTTP_HOST'\'']);'
                  echo '            }'
                } > "$WPCONFIG_INSERT_TMP"
                awk 'NR==FNR { buf = buf $0 ORS; next } /stop editing! Happy publishing/ && !done { printf "%s", buf; done=1 } { print }' "$WPCONFIG_INSERT_TMP" wp-config.php > "$WPCONFIG_MERGED_TMP"
                mv "$WPCONFIG_MERGED_TMP" wp-config.php
                rm -f "$WPCONFIG_INSERT_TMP"
              fi
              # Step 8 - Fix the permissions
              usermod -a -G apache ec2-user
              chown -R ec2-user:apache /var/www
              chmod 2775 /var/www
              find /var/www -type d -exec chmod 2775 {} \;
              find /var/www -type f -exec chmod 0664 {} \;
              # Step 8b - Mount first XFS partition from uploads snapshot volume with nouuid - rsync wp-content/uploads into place when restoring from stage2 root snapshot.
              if [ -n "$SNAPSHOT_ID" ]; then
                set +e
                for attempt in $(seq 1 30); do
                  ( [ -b /dev/xvdf1 ] || [ -b /dev/sdf1 ] || [ -b /dev/nvme1n1p1 ] || [ -b /dev/nvme2n1p1 ] || [ -b /dev/sdf ] || [ -b /dev/xvdf ] ) && break
                  sleep 5
                done
                for DATA_DEV in /dev/nvme1n1p1 /dev/nvme2n1p1 /dev/xvdf1 /dev/sdf1 /dev/xvdf /dev/sdf /dev/nvme1n1 /dev/nvme2n1; do
                  [ -b "$DATA_DEV" ] || continue
                  mkdir -p /mnt/wp-uploads-source
                  if mount -o nouuid,ro "$DATA_DEV" /mnt/wp-uploads-source 2>/dev/null || mount -o nouuid "$DATA_DEV" /mnt/wp-uploads-source 2>/dev/null; then
                    if [ -d /mnt/wp-uploads-source/var/www/html/wp-content/uploads ]; then
                      rsync -a /mnt/wp-uploads-source/var/www/html/wp-content/uploads/ /var/www/html/wp-content/uploads/
                      umount /mnt/wp-uploads-source 2>/dev/null || true
                      break
                    fi
                    umount /mnt/wp-uploads-source 2>/dev/null || true
                  fi
                done
                mkdir -p /var/www/html/wp-content/uploads
                chown -R ec2-user:apache /var/www/html/wp-content/uploads
                set -e
              fi
              # Step 9 - Use cfn-init + cfn-hup for stack-driven refresh on EC2 Metadata change
              mkdir -p /etc/cfn/hooks.d
              touch /var/log/cfn-wp-refresh.log
              {
                echo '[main]'
                echo "stack=${AWS::StackId}"
                echo "region=${AWS::Region}"
                echo 'verbose=true'
                echo 'interval=5'
              } >/etc/cfn/cfn-hup.conf
              {
                echo '[cfn-auto-reloader-hook]'
                echo 'triggers=post.update'
                echo 'path=Resources.WordpressEC2.Metadata'
                echo "action=/opt/aws/bin/cfn-init -v -c wordpress_always --stack ${AWS::StackId} --resource WordpressEC2 --region ${AWS::Region}"
              } >/etc/cfn/hooks.d/cfn-auto-reloader.conf
              /opt/aws/bin/cfn-init -v -c wordpress_always --stack ${AWS::StackId} --resource WordpressEC2 --region ${AWS::Region} || echo "cfn-init non-zero exit" >> /var/log/cfn-wp-refresh.log
              nohup /opt/aws/bin/cfn-hup >/var/log/cfn-hup.log 2>&1 &
            - UploadsCfnVolumeId: !If
                - HasUploadsSourceEbsSnapshot
                - !Ref WordpressUploadsSourceVolume
                - ''

# WordPress app server + RDS database
  WordpressEC2:
    Type: AWS::EC2::Instance
    DependsOn:
      - RDSinstance
      - LocalMariaDbToRdsMigration    
    Metadata:
      AWS::CloudFormation::Init:
        configSets:
          wordpress_always:
            - sync_public_endpoint
            - restore_uploads_from_ebs_snapshot_volume
        sync_public_endpoint:
          commands:
            00_add_timestamp:
              command: !Sub 'echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) cfn-init CfnMetadataNonce=${CfnMetadataNonce}" >> /var/log/cfn-wp-refresh.log'
            01_wp_sync_public_ip:
              command: |
                # Read IMDS session token - public IPv4 - and public hostname for this instance.
                # Set WordPress home and siteurl from hostname when present - otherwise from IPv4 - search-replace stale URLs in the database (same pattern as stage2).
                IMDS_SESSION_TOKEN=$(curl -fsS -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
                IMDS_PUBLIC_IPV4=$(curl -fsS -H "X-aws-ec2-metadata-token: $IMDS_SESSION_TOKEN" http://169.254.169.254/latest/meta-data/public-ipv4 2>/dev/null || true)
                IMDS_PUBLIC_HOSTNAME=$(curl -fsS -H "X-aws-ec2-metadata-token: $IMDS_SESSION_TOKEN" http://169.254.169.254/latest/meta-data/public-hostname 2>/dev/null || true)
                if [ -z "$IMDS_PUBLIC_IPV4" ]; then echo "No public IPv4; skipping wp option sync" >> /var/log/cfn-wp-refresh.log; exit 0; fi
                if [ ! -f /var/www/html/wp-cli.phar ]; then curl -fsSLo /var/www/html/wp-cli.phar https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar || exit 0; fi
                cd /var/www/html
                if [ -n "$IMDS_PUBLIC_HOSTNAME" ]; then NEW_PUBLIC_SITE_URL="http://$IMDS_PUBLIC_HOSTNAME"; else NEW_PUBLIC_SITE_URL="http://$IMDS_PUBLIC_IPV4"; fi
                PREVIOUS_HOME_URL=$(php /var/www/html/wp-cli.phar --path=/var/www/html --allow-root option get home 2>/dev/null || true)
                PREVIOUS_SITEURL=$(php /var/www/html/wp-cli.phar --path=/var/www/html --allow-root option get siteurl 2>/dev/null || true)
                if [ -z "$PREVIOUS_HOME_URL$PREVIOUS_SITEURL" ]; then echo "WARN 01_wp_sync_public_ip: empty home/siteurl from wp-cli; URL search-replace may miss" >> /var/log/cfn-wp-refresh.log; fi
                wp_search_replace_if_changed() {
                  SEARCH_REPLACE_OLD_VALUE="$1"
                  SEARCH_REPLACE_NEW_VALUE="$2"
                  if [ -n "$SEARCH_REPLACE_OLD_VALUE" ] && [ "$SEARCH_REPLACE_OLD_VALUE" != "$SEARCH_REPLACE_NEW_VALUE" ]; then
                    php /var/www/html/wp-cli.phar --path=/var/www/html --allow-root search-replace "$SEARCH_REPLACE_OLD_VALUE" "$SEARCH_REPLACE_NEW_VALUE" --all-tables >> /var/log/cfn-wp-refresh.log 2>&1 || true
                  fi
                }
                php /var/www/html/wp-cli.phar --path=/var/www/html --allow-root option update home "$NEW_PUBLIC_SITE_URL" >> /var/log/cfn-wp-refresh.log 2>&1 || true
                php /var/www/html/wp-cli.phar --path=/var/www/html --allow-root option update siteurl "$NEW_PUBLIC_SITE_URL" >> /var/log/cfn-wp-refresh.log 2>&1 || true
                # Search-replace old home and siteurl through the database - cover trailing-slash variants - do not hand-escape JSON for wp-cli (avoids corrupting block editor JSON).
                wp_search_replace_if_changed "$PREVIOUS_HOME_URL" "$NEW_PUBLIC_SITE_URL"
                wp_search_replace_if_changed "$PREVIOUS_SITEURL" "$NEW_PUBLIC_SITE_URL"
                for PREVIOUS_HOME_OR_SITEURL in "$PREVIOUS_HOME_URL" "$PREVIOUS_SITEURL"; do
                  [ -z "$PREVIOUS_HOME_OR_SITEURL" ] && continue
                  PREVIOUS_URL_WITHOUT_TRAILING_SLASHES=$(printf '%s' "$PREVIOUS_HOME_OR_SITEURL" | sed 's|/*$||')
                  PREVIOUS_URL_WITH_TRAILING_SLASH_AFTER_HOST="${PREVIOUS_URL_WITHOUT_TRAILING_SLASHES}/"
                  wp_search_replace_if_changed "$PREVIOUS_URL_WITHOUT_TRAILING_SLASHES" "$NEW_PUBLIC_SITE_URL"
                  wp_search_replace_if_changed "$PREVIOUS_URL_WITH_TRAILING_SLASH_AFTER_HOST" "$NEW_PUBLIC_SITE_URL"
                done
                # Map dotted IPv4 home host to regional ec2-* DNS and legacy us-east-1 form - search-replace those URLs when they appear in content.
                PREVIOUS_HOME_HOST=$(echo "$PREVIOUS_HOME_URL" | sed 's|^[^/]*//||;s|/.*||')
                if echo "$PREVIOUS_HOME_HOST" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
                  PREVIOUS_HOME_IPV4_EC2_PUBLIC_DNS_LABEL=$(echo "$PREVIOUS_HOME_HOST" | tr '.' '-')
                  IMDS_INSTANCE_IDENTITY_DOCUMENT=$(curl -fsS -H "X-aws-ec2-metadata-token: $IMDS_SESSION_TOKEN" http://169.254.169.254/latest/dynamic/instance-identity/document 2>/dev/null || true)
                  IMDS_INSTANCE_REGION=$(echo "$IMDS_INSTANCE_IDENTITY_DOCUMENT" | sed -n 's/.*"region"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
                  if [ -n "$PREVIOUS_HOME_IPV4_EC2_PUBLIC_DNS_LABEL" ] && [ -n "$IMDS_INSTANCE_REGION" ]; then
                    PREVIOUS_HOME_EC2_REGIONAL_PUBLIC_DNS_URL=$(printf 'http://ec2-%s.%s.compute.amazonaws.com' "$PREVIOUS_HOME_IPV4_EC2_PUBLIC_DNS_LABEL" "$IMDS_INSTANCE_REGION")
                    wp_search_replace_if_changed "$PREVIOUS_HOME_EC2_REGIONAL_PUBLIC_DNS_URL" "$NEW_PUBLIC_SITE_URL"
                    if [ "$IMDS_INSTANCE_REGION" = "us-east-1" ]; then
                      PREVIOUS_HOME_EC2_US_EAST_LEGACY_PUBLIC_DNS_URL=$(printf 'http://ec2-%s.compute-1.amazonaws.com' "$PREVIOUS_HOME_IPV4_EC2_PUBLIC_DNS_LABEL")
                      wp_search_replace_if_changed "$PREVIOUS_HOME_EC2_US_EAST_LEGACY_PUBLIC_DNS_URL" "$NEW_PUBLIC_SITE_URL"
                    fi
                  fi
                # Map ec2-* DNS home host back to dotted IPv4 http URL - search-replace when content still references the IPv4 form.
                elif echo "$PREVIOUS_HOME_HOST" | grep -qE '^ec2-[0-9-]+\.'; then
                  PREVIOUS_HOME_EC2_DNS_IPV4_LABEL=$(echo "$PREVIOUS_HOME_HOST" | sed 's/^ec2-\([0-9-]*\)\..*/\1/')
                  if [ -n "$PREVIOUS_HOME_EC2_DNS_IPV4_LABEL" ]; then
                    PREVIOUS_HOME_IPV4_DOTTED_FROM_EC2_DNS_HOST=$(echo "$PREVIOUS_HOME_EC2_DNS_IPV4_LABEL" | awk -F- 'NF>=4 {print $1"."$2"."$3"."$4}')
                    if [ -n "$PREVIOUS_HOME_IPV4_DOTTED_FROM_EC2_DNS_HOST" ]; then
                      PREVIOUS_HOME_HTTP_DOTTED_IPV4_URL=$(printf 'http://%s' "$PREVIOUS_HOME_IPV4_DOTTED_FROM_EC2_DNS_HOST")
                      wp_search_replace_if_changed "$PREVIOUS_HOME_HTTP_DOTTED_IPV4_URL" "$NEW_PUBLIC_SITE_URL"
                    fi
                  fi
                fi
                # When site URL uses hostname - replace leftover http://<ipv4> references in content with that hostname URL.
                if [ -n "$IMDS_PUBLIC_HOSTNAME" ] && [ "$NEW_PUBLIC_SITE_URL" != "http://$IMDS_PUBLIC_IPV4" ]; then
                  wp_search_replace_if_changed "http://$IMDS_PUBLIC_IPV4" "$NEW_PUBLIC_SITE_URL"
                fi
              cwd: /var/www/html
        restore_uploads_from_ebs_snapshot_volume:
          commands:
            # Re-run uploads rsync from the attached snapshot volume when metadata nonce or restore flag changes (cfn-hup refresh).
            02_restore_wp_uploads_from_snapshot_volume:
              command: !Sub
                - |
                  set +e
                  # Wait for snapshot block device - mount first XFS partition with nouuid - rsync wp-content/uploads - fix ownership.
                  UPLOADS_SNAPSHOT="${EbsSnapshotId}"
                  if [ -z "$UPLOADS_SNAPSHOT" ]; then echo "No UploadsSourceEbsSnapshotId; skip restore" >> /var/log/cfn-wp-refresh.log; exit 0; fi
                  for attempt in $(seq 1 120); do
                    ( [ -b /dev/xvdf1 ] || [ -b /dev/sdf1 ] || [ -b /dev/nvme1n1p1 ] || [ -b /dev/nvme2n1p1 ] || [ -b /dev/sdf ] || [ -b /dev/xvdf ] ) && break
                    sleep 5
                  done
                  for DATA_DEV in /dev/nvme1n1p1 /dev/nvme2n1p1 /dev/xvdf1 /dev/sdf1 /dev/xvdf /dev/sdf /dev/nvme1n1 /dev/nvme2n1; do
                    [ -b "$DATA_DEV" ] || continue
                    mkdir -p /mnt/wp-uploads-source
                    if mount -o nouuid,ro "$DATA_DEV" /mnt/wp-uploads-source 2>/dev/null || mount -o nouuid "$DATA_DEV" /mnt/wp-uploads-source 2>/dev/null; then
                      if [ -d /mnt/wp-uploads-source/var/www/html/wp-content/uploads ]; then
                        rsync -a /mnt/wp-uploads-source/var/www/html/wp-content/uploads/ /var/www/html/wp-content/uploads/
                        umount /mnt/wp-uploads-source 2>/dev/null || true
                        echo "cfn-init: restored wp-content/uploads from $UPLOADS_SNAPSHOT via $DATA_DEV" >> /var/log/cfn-wp-refresh.log
                        chown -R ec2-user:apache /var/www/html/wp-content/uploads
                        exit 0
                      fi
                      umount /mnt/wp-uploads-source 2>/dev/null || true
                    fi
                  done
                  echo "cfn-init: WARNING uploads snapshot volume missing or no uploads dir (snap=$UPLOADS_SNAPSHOT)" >> /var/log/cfn-wp-refresh.log
                  exit 0
                - EbsSnapshotId: !Ref UploadsSourceEbsSnapshotId
      WpContentUploadsRestore:
        EbsSnapshotId: !Ref UploadsSourceEbsSnapshotId
    CreationPolicy:
      ResourceSignal:
        # t2.micro + dnf --refresh upgrade + WordPress + optional uploads rsync + cfn-init can exceed PT15M; PT45M matches realistic same-stack cutover headroom.
        Timeout: PT45M
    Properties:
      SubnetId: !Ref SubnetPublicA
      LaunchTemplate:
        LaunchTemplateId: !Ref WordpressAppTierLT
        Version: !GetAtt WordpressAppTierLT.LatestVersionNumber
      Tags:
        - Key: Name
          Value: Wordpress-LT-built-Db-split
        - Key: CfnMetadataNonce
          Value: !Sub '${CfnMetadataNonce}'

  RDSinstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    Properties:
      Engine: mysql
      #Mandatory MySQL parameter aka "Initial database name" in console
      DBName: !GetAtt DBName.Value 
      #Free tier eligible settings
      EngineVersion: 8.4 #Latest MySQL LTS
      DBInstanceClass: "db.t3.micro"
      AllocatedStorage: 20
      StorageType: gp3
      #Default settings
      # NetworkType: IPV4
      # PubliclyAccessible: false
      MultiAZ: false
      DBInstanceIdentifier: !GetAtt DBName.Value
      MasterUsername: !GetAtt DBUser.Value
      MasterUserPassword: "{{resolve:ssm-secure:/Wordpress/DBPassword}}"
      DBSubnetGroupName: !Ref RDSSubnetGroup
      VPCSecurityGroups:
        - !Ref SGDatabase
      AvailabilityZone: !GetAtt SubnetPublicA.AvailabilityZone
  #RDSinstance can be improved further with RDS proxy within this stage

# Other resources for WordPress server 
  SGWordpress:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      VpcId: !Ref VPC
      GroupName: wordpress-sg
      GroupDescription: "Allow HTTP traffic to WordPress web server"
      SecurityGroupIngress: 
        - Description: "Allow HTTP IPv4 from anywhere (port 80)"
          IpProtocol: tcp
          FromPort: '80'
          ToPort: '80'
          CidrIp: '0.0.0.0/0'  #Restrict to specific IPs/ranges in production
  WordpressInstanceProfile:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      Path: /
      Roles:
        - !Ref WordpressRole
  WordpressRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
              - ec2.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Path: /
      ManagedPolicyArns: 
        - "arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy"
        - "arn:aws:iam::aws:policy/AmazonSSMFullAccess"
        - "arn:aws:iam::aws:policy/AmazonElasticFileSystemClientFullAccess"
        - "arn:aws:iam::aws:policy/AWSCloudFormationReadOnlyAccess"
        - "arn:aws:iam::aws:policy/AmazonEC2FullAccess"
      Policies:
        - PolicyName: cfn-signal
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action: cloudformation:SignalResource
                Resource: !Sub
                  'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${AWS::StackName}/*'

# Other resources for RDS database 
  SGDatabase:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      VpcId: !Ref VPC
      GroupName: database-sg
      GroupDescription: "Allow MySQL connections from WordPress instances only"
      SecurityGroupIngress: 
        - Description: "Allow MySQL from WordPress security group (port 3306)"
          IpProtocol: tcp
          FromPort: '3306'
          ToPort: '3306'
          SourceSecurityGroupId: !Ref SGWordpress  #Only WordPress can connect
  RDSSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: "WordPressRDSSubnetGroup"     
      DBSubnetGroupDescription: "RDS Subnet Group for the WordPress DB"
      SubnetIds: 
        - !Ref SubnetDbA
        - !Ref SubnetDbB
        - !Ref SubnetDbC
      Tags:
        - Key: Name
          Value: "WordPressRDSSubnetGroup"



Outputs:
  WordpressURL:
    Description: >-
      http:// + instance public DNS when running. Uses PublicDnsName so stack updates still work if the instance is stopped
      (URL may show as http:// until you start the instance again; use WordpressInstanceAutoIP when the instance is running).
    Value: !Sub 'http://${WordpressEC2.PublicDnsName}'
  WordpressInstanceAutoIP:
    Description: >-
      Ephemeral public IPv4 assigned to WordpressEC2 while running. Absent when stopped.
      Start the instance before stack update if CloudFormation fails resolving this output.
    Value: !GetAtt WordpressEC2.PublicIp