# IMPORTANT: Refer to the .md file for instructions on creating the DBPassword
# SecureString parameter manually before deploying this template.
AWSTemplateFormatVersion: 2010-09-09
Description: WordPress application AWS architecture evolution - Stage 3 (Single EC2 instance with separate RDS database)
Parameters:
  LatestAmiId:
    Description: Latest Amazon Linux 2023 AMI.
    #Automatically fetches latest AL2023 AMI ID from AWS Systems Manager
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.18-x86_64'
  WordpressDbDumpS3Bucket:
    Type: String
    Default: ''
    Description: >-
      Same-stack upgrade from stage 2: S3 bucket that holds a logical dump of the MariaDB database from the old instance
      (mysqldump). Leave empty for a greenfield stage 3 stack. If set, WordpressDbDumpS3Key must also be set.
  WordpressDbDumpS3Key:
    Type: String
    Default: ''
    Description: >-
      Object key for the dump inside WordpressDbDumpS3Bucket (plain .sql or .sql.gz). Used only when the bucket is non-empty.

Conditions:
  HasDbDumpMigration: !And
    - !Not [!Equals [!Ref WordpressDbDumpS3Bucket, '']]
    - !Not [!Equals [!Ref WordpressDbDumpS3Key, '']]

Resources:
# Network skeleton with Db subnets added for RDS resources (2 tiers: Public/App + Db)
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.125.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
      - Key: Name
        Value: !Sub 'vpc-${AWS::Region}'
  SubnetPublicA:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      CidrBlock: 10.125.0.0/20
      MapPublicIpOnLaunch: true
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock:
        Fn::Sub:
          - "${VpcPart}${SubnetPart}"
          - SubnetPart: '00::/64'
            VpcPart: !Select [ 0, !Split [ '00::/56', !Select [ 0, !GetAtt VPC.Ipv6CidrBlocks ]]]
      Tags:
        - Key: Name
          Value: sn-public-A
  SubnetPublicB:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 1, !GetAZs '' ]
      CidrBlock: 10.125.16.0/20
      MapPublicIpOnLaunch: true
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock:
        Fn::Sub:
          - "${VpcPart}${SubnetPart}"
          - SubnetPart: '01::/64'
            VpcPart: !Select [ 0, !Split [ '00::/56', !Select [ 0, !GetAtt VPC.Ipv6CidrBlocks ]]]
      Tags:
        - Key: Name
          Value: sn-public-B
  SubnetPublicC:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 2, !GetAZs '' ]
      CidrBlock: 10.125.32.0/20
      MapPublicIpOnLaunch: true
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock:
        Fn::Sub:
          - "${VpcPart}${SubnetPart}"
          - SubnetPart: '02::/64'
            VpcPart: !Select [ 0, !Split [ '00::/56', !Select [ 0, !GetAtt VPC.Ipv6CidrBlocks ]]]
      Tags:
        - Key: Name
          Value: sn-public-C
  SubnetDbA:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      CidrBlock: 10.125.48.0/20
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock: 
        Fn::Sub:
          - "${VpcPart}${SubnetPart}"
          - SubnetPart: '03::/64'
            VpcPart: !Select [ 0, !Split [ '00::/56', !Select [ 0, !GetAtt VPC.Ipv6CidrBlocks ]]]
      Tags:
        - Key: Name
          Value: sn-db-A
  SubnetDbB:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 1, !GetAZs '' ]
      CidrBlock: 10.125.64.0/20
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock: 
        Fn::Sub:
          - "${VpcPart}${SubnetPart}"
          - SubnetPart: '04::/64'
            VpcPart: !Select [ 0, !Split [ '00::/56', !Select [ 0, !GetAtt VPC.Ipv6CidrBlocks ]]]
      Tags:
        - Key: Name
          Value: sn-db-B
  SubnetDbC:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 2, !GetAZs '' ]
      CidrBlock: 10.125.80.0/20
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock: 
        Fn::Sub:
          - "${VpcPart}${SubnetPart}"
          - SubnetPart: '05::/64'
            VpcPart: !Select [ 0, !Split [ '00::/56', !Select [ 0, !GetAtt VPC.Ipv6CidrBlocks ]]]
      Tags:
        - Key: Name
          Value: sn-db-C
  IPv6CidrBlock:
    Type: AWS::EC2::VPCCidrBlock
    Properties:
      VpcId: !Ref VPC
      AmazonProvidedIpv6CidrBlock: true
  InternetGateway:
    Type: 'AWS::EC2::InternetGateway'
    Properties:
      Tags:
      - Key: Name
        Value: !Sub 'igw-${AWS::Region}'
  InternetGatewayAttachment:
    Type: 'AWS::EC2::VPCGatewayAttachment'
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway
  RTPublic: 
    Type: 'AWS::EC2::RouteTable'
    Properties:
      VpcId: !Ref VPC
      Tags:
      - Key: Name
        Value: !Sub 'vpc-rt-public-${AWS::Region}'
  RTPublicDefaultIPv4: 
    Type: 'AWS::EC2::Route'
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId:
        Ref: RTPublic
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId:
        Ref: InternetGateway
  RTPublicDefaultIPv6: 
    Type: 'AWS::EC2::Route'
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId:
        Ref: RTPublic
      DestinationIpv6CidrBlock: '::/0'
      GatewayId:
        Ref: InternetGateway
  RTAssociationPubA:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref SubnetPublicA
      RouteTableId:
        Ref: RTPublic
  RTAssociationPubB:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref SubnetPublicB
      RouteTableId:
        Ref: RTPublic
  RTAssociationPubC:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref SubnetPublicC
      RouteTableId:
        Ref: RTPublic

# SSM Parameters for WordPress configuration
  DBName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/Wordpress/DBName"
      Description: "Wordpress Database Name"
      Type: String
      Value: "wordpressdb"
  DBUser:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/Wordpress/DBUser"
      Description: "Wordpress Database User"
      Type: String
      Value: "wordpressuser"
  DBEndpoint:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/Wordpress/DBEndpoint"
      Description: "Wordpress Endpoint Name"
      Type: String
      #Stage 3: Points to RDS MySQL endpoint (replaces localhost from Stage 1-2)
      Value: !GetAtt RDSinstance.Endpoint.Address

# WordPress app server + RDS database
  SGWordpress:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      VpcId: !Ref VPC
      GroupName: wordpress-sg
      GroupDescription: "Allow HTTP traffic to WordPress web server"
      SecurityGroupIngress: 
        - Description: "Allow HTTP IPv4 from anywhere (port 80)"
          IpProtocol: tcp
          FromPort: '80'
          ToPort: '80'
          CidrIp: '0.0.0.0/0'  #Restrict to specific IPs/ranges in production
  SGDatabase:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      VpcId: !Ref VPC
      GroupName: database-sg
      GroupDescription: "Allow MySQL connections from WordPress instances only"
      SecurityGroupIngress: 
        - Description: "Allow MySQL from WordPress security group (port 3306)"
          IpProtocol: tcp
          FromPort: '3306'
          ToPort: '3306'
          SourceSecurityGroupId: !Ref SGWordpress  #Only WordPress can connect

  WordpressInstanceProfile:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      Path: /
      Roles:
        - !Ref WordpressRole
  WordpressRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
              - ec2.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Path: /
      ManagedPolicyArns: 
        - "arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy"
        - "arn:aws:iam::aws:policy/AmazonSSMFullAccess"
        - "arn:aws:iam::aws:policy/AmazonElasticFileSystemClientFullAccess"
      Policies:
        - PolicyName: !Sub wordpress-db-dump-s3-${AWS::StackName}
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !If
                  - HasDbDumpMigration
                  - !Sub 'arn:aws:s3:::${WordpressDbDumpS3Bucket}/${WordpressDbDumpS3Key}'
                  - !Sub 'arn:aws:s3:::__wordpress_stage3_no_migration__/${AWS::StackName}-placeholder'

 #Launch template modified to run app only, without local database
  WordpressLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    DependsOn:
      - DBName
      - DBUser    
      - DBEndpoint
    Properties:
      LaunchTemplateName: !Sub '${AWS::StackName}-wordpress-stage3-app'
      VersionDescription: Launches WordPress app tier only (RDS for database); name is stack-scoped to avoid clashing with stage 2 LT name Wordpress on same-stack update
      LaunchTemplateData: 
        ImageId: !Ref LatestAmiId
        InstanceType: t2.micro
        SecurityGroupIds:
          - !GetAtt SGWordpress.GroupId
        IamInstanceProfile:
          Arn: !GetAtt WordpressInstanceProfile.Arn          
        DisableApiTermination: true
        CreditSpecification:
          CpuCredits: Standard
        MetadataOptions:
          HttpEndpoint: enabled
          HttpTokens: required
          HttpPutResponseHopLimit: 2
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash -xe
            M_BKT='${WordpressDbDumpS3Bucket}'
            M_KEY='${WordpressDbDumpS3Key}'
            # Step 1 - Import parameter store values
            DBName=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/DBName --query Parameters[0].Value --output text)
            DBUser=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/DBUser --query Parameters[0].Value --output text)
            DBEndpoint=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/DBEndpoint --query Parameters[0].Value --output text)
            DBPassword=$(aws ssm get-parameters --region ${AWS::Region} --names /Wordpress/DBPassword --with-decryption --query Parameters[0].Value --output text)
            # Step 2 - System Updates
            dnf -y update
            dnf -y upgrade
            # Step 3 - Install system software - Web server + MySQL client (optional RDS import from stage 2 via S3)
            dnf install -y wget httpd php php-mysqlnd php-fpm php-mysqli php-json php-mbstring php-xml php-gd php-opcache php-intl php-zip php-devel stress mariadb1011-client-utils
            # Step 4 - Web Server Online - and set to startup
            systemctl enable httpd
            systemctl start httpd
            # Step 5 - Download & install Wordpress
            wget https://wordpress.org/latest.tar.gz -P /var/www/html
            cd /var/www/html
            tar -zxvf latest.tar.gz
            cp -rvf wordpress/* .
            rm -R wordpress
            rm latest.tar.gz
            # Step 6 - Configure Wordpress
            cp ./wp-config-sample.php ./wp-config.php
            sed -i "s/'database_name_here'/'$DBName'/g" wp-config.php
            sed -i "s/'username_here'/'$DBUser'/g" wp-config.php
            sed -i "s/'password_here'/'$DBPassword'/g" wp-config.php
            sed -i "s/'localhost'/'$DBEndpoint'/g" wp-config.php
            # Step 6b - Browser hostname for redirects when public DNS/IP changes
            if ! grep -q 'Follow browser hostname for WP_HOME' wp-config.php; then
              WPCONFIG_INSERT_TMP=$(mktemp)
              WPCONFIG_MERGED_TMP=$(mktemp)
              cat > "$WPCONFIG_INSERT_TMP" <<'WPCONFIG_BROWSER_HOST_SNIPPET'
            /* Follow browser hostname for WP_HOME and WP_SITEURL (HTTP_HOST; no fixed public IP in redirects). */
            if (php_sapi_name() !== 'cli' && !empty($_SERVER['HTTP_HOST'])) {
                define('WP_HOME', 'http://' . $_SERVER['HTTP_HOST']);
                define('WP_SITEURL', 'http://' . $_SERVER['HTTP_HOST']);
            }
            WPCONFIG_BROWSER_HOST_SNIPPET
              awk 'NR==FNR { buf = buf $0 ORS; next } /stop editing! Happy publishing/ && !done { printf "%s", buf; done=1 } { print }' "$WPCONFIG_INSERT_TMP" wp-config.php > "$WPCONFIG_MERGED_TMP"
              mv "$WPCONFIG_MERGED_TMP" wp-config.php
              rm -f "$WPCONFIG_INSERT_TMP"
            fi
            # Step 7 - Optional: import MariaDB dump from stage 2 (S3) into RDS
            if [ -n "$M_BKT" ] && [ -n "$M_KEY" ]; then
              echo "Waiting for RDS to accept connections on $DBEndpoint ..."
              for i in $(seq 1 90); do
                if mysqladmin ping -h"$DBEndpoint" -u"$DBUser" -p"$DBPassword" --connect-timeout=5 --silent 2>/dev/null; then
                  echo "RDS is up."
                  break
                fi
                sleep 10
              done
              DUMPF=/tmp/wp-migrate.dump
              aws s3 cp "s3://$M_BKT/$M_KEY" "$DUMPF" --region ${AWS::Region}
              if [[ "$M_KEY" == *.gz ]]; then
                gunzip -c "$DUMPF" | mysql -h"$DBEndpoint" -u"$DBUser" -p"$DBPassword" "$DBName"
              else
                mysql -h"$DBEndpoint" -u"$DBUser" -p"$DBPassword" "$DBName" < "$DUMPF"
              fi
              rm -f "$DUMPF"
            fi
            # Step 8 - Fix the permissions
            usermod -a -G apache ec2-user
            chown -R ec2-user:apache /var/www
            chmod 2775 /var/www
            find /var/www -type d -exec chmod 2775 {} \;
            find /var/www -type f -exec chmod 0664 {} \;
  WordpressEC2:
    Type: AWS::EC2::Instance
    DependsOn:
      - RDSinstance
    Properties:
      SubnetId: !Ref SubnetPublicA
      LaunchTemplate:
        LaunchTemplateId: !Ref WordpressLaunchTemplate
        Version: !GetAtt WordpressLaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: Wordpress-LT-Db-Split
  #WordpressEC2 can be improved further with cfn scripts within this stage.

# RDS resources needed to split Database from WordpressEC2
  RDSSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: "WordPressRDSSubnetGroup"     
      DBSubnetGroupDescription: "RDS Subnet Group for the WordPress DB"
      SubnetIds: 
        - !Ref SubnetDbA
        - !Ref SubnetDbB
        - !Ref SubnetDbC
      Tags:
        - Key: Name
          Value: "WordPressRDSSubnetGroup"
  RDSinstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    Properties:
      Engine: mysql
      #Mandatory MySQL parameter aka "Initial database name" in console
      DBName: !GetAtt DBName.Value 
      #Free tier eligible settings
      EngineVersion: 8.4 #Latest MySQL LTS
      DBInstanceClass: "db.t3.micro"
      AllocatedStorage: 20
      StorageType: gp3
      #Default settings
      # NetworkType: IPV4
      # PubliclyAccessible: false
      MultiAZ: false
      DBInstanceIdentifier: !GetAtt DBName.Value
      MasterUsername: !GetAtt DBUser.Value
      MasterUserPassword: "{{resolve:ssm-secure:/Wordpress/DBPassword}}"
      DBSubnetGroupName: !Ref RDSSubnetGroup
      VPCSecurityGroups:
        - !Ref SGDatabase
      AvailabilityZone: !GetAtt SubnetPublicA.AvailabilityZone
  #RDSinstance can be improved further with RDS proxy within this stage

Outputs:
  WordpressURL:
    Description: >-
      http:// + instance public DNS when running. Uses PublicDnsName so stack updates still work if the instance is stopped
      (URL may show as http:// until you start the instance again; use WordpressInstanceAutoIP when the instance is running).
    Value: !Sub 'http://${WordpressEC2.PublicDnsName}'
  WordpressInstanceAutoIP:
    Description: >-
      Ephemeral public IPv4 assigned to WordpressEC2 while running. Absent when stopped. Start the instance before stack update.
      if CloudFormation fails resolving this output.
    Value: !GetAtt WordpressEC2.PublicIp